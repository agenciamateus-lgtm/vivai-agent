  <style>
    :root {
      --navy: #0d1f2d;
      --navy2: #122536;
      --navy3: #1a3147;
      --cyan: #00d4ff;
      --cyan2: #00b8e0;
      --magenta: #ff2d78;
      --orange: #ff8c00;
      --gold: #ffb800;
      --sunset1: #ff2d78;
      --sunset2: #ff6b35;
      --sunset3: #ffb800;
      --sunset4: #00d4ff;
      --white: #ffffff;
      --text: #e8f4f8;
      --muted: #7a9bb5;
      --card: rgba(255,255,255,0.04);
      --border: rgba(0,212,255,0.15);
      --border2: rgba(0,212,255,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); font-family: 'Barlow', sans-serif; color: var(--text); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; opacity: 0.5; }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes pulse-cyan {
      0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.3); }
      50% { box-shadow: 0 0 20px rgba(0,212,255,0.6); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    input, select, textarea, button {
      font-family: 'Barlow', sans-serif;
    }
  </style>

const STAGES = ["Lead","Qualificado","Proposta","Negociação","Fechado"];

  Lead: "#00d4ff",
  Qualificado: "#00b8e0",
  Proposta: "#ffb800",

// ── Gradient text helper ──
const GradText = ({children, style={}}) => (
  <span style={{
    background: "linear-gradient(90deg, #00d4ff, #ff2d78)",
    WebkitBackgroundClip: "text",
    WebkitTextFillColor: "transparent",
    backgroundClip: "text",
    ...style
  }}>{children}</span>
);

// ── Avatar ──
function Avatar({name, size=36}) {
  const initials = name.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();
  const colors = [
    "linear-gradient(135deg,#00d4ff,#0066ff)",
    "linear-gradient(135deg,#ff2d78,#ff6b35)",
    "linear-gradient(135deg,#ffb800,#ff6b35)",
    "linear-gradient(135deg,#00d4ff,#ff2d78)",
  ];
  const bg = colors[name.charCodeAt(0) % colors.length];
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bg, display:"flex", alignItems:"center", justifyContent:"center",
      color:"#fff", fontSize: size*0.36, fontWeight:700, flexShrink:0,
      border: "1.5px solid rgba(0,212,255,0.4)"
    }}>{initials}</div>
  );
}

// ── Badge ──
function Badge({label, color="#00d4ff"}) {
  return (
    <span style={{
      background: color+"22", color, border:`1px solid ${color}55`,
      borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:600,
      letterSpacing:0.5, textTransform:"uppercase", fontFamily:"'Barlow Condensed',sans-serif"
    }}>{label}</span>
  );
}

// ── KPI Card ──
function KpiCard({icon, label, value, sub, gradient}) {
  return (
    <div className="fade-in" style={{
      background: "rgba(255,255,255,0.03)",
      border: "1px solid rgba(0,212,255,0.15)",
      borderRadius:12, padding:"20px 22px", position:"relative", overflow:"hidden",
      backdropFilter:"blur(10px)"
    }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:gradient}}/>
      <div style={{fontSize:26,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:11,color:"#7a9bb5",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>{label}</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:1,lineHeight:1,
        background:gradient, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text"
      }}>{value}</div>
      {sub && <div style={{fontSize:12,color:"#7a9bb5",marginTop:6}}>{sub}</div>}
    </div>
  );
}

// ── Modal ──
function Modal({title, onClose, children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,31,45,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(4px)"}}>
      <div style={{background:"#122536",border:"1px solid rgba(0,212,255,0.3)",borderRadius:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflow:"auto",boxShadow:"0 0 60px rgba(0,212,255,0.15)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px 16px",borderBottom:"1px solid rgba(0,212,255,0.15)"}}>
          <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,letterSpacing:1,color:"#00d4ff"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#7a9bb5",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"20px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

// ── Form helpers ──
const fldStyle = {width:"100%",padding:"9px 12px",background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:14,outline:"none",boxSizing:"border-box"};
const lblStyle = {fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"};

function Field({label, ...props}) {
  return <div style={{marginBottom:14}}><label style={lblStyle}>{label}</label><input {...props} style={fldStyle}/></div>;
}
function SelField({label, options, ...props}) {
  return <div style={{marginBottom:14}}><label style={lblStyle}>{label}</label>
    <select {...props} style={fldStyle}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
  </div>;
}

function Btn({children, variant="primary", onClick, style={}}) {
  const s = {
    primary: {background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",border:"none"},
    secondary: {background:"transparent",color:"#00d4ff",border:"1px solid #00d4ff"},
    danger: {background:"linear-gradient(90deg,#ff2d78,#ff6b35)",color:"#fff",border:"none"},
  };
  return <button onClick={onClick} style={{...s[variant],padding:"9px 20px",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif",letterSpacing:0.3,...style}}>{children}</button>;
}

// ══ VIEWS ══════════════════════════════════════════════════════════════

function Dashboard({clients, interactions, tasks, leadScores, analyzing, onAnalyze}) {
  const totalPipeline = clients.reduce((s,c)=>s+c.value,0);
  const closed = clients.filter(c=>c.stage==="Fechado");
  const closedValue = closed.reduce((s,c)=>s+c.value,0);
  const pending = tasks.filter(t=>!t.done);
  const overdue = pending.filter(t=>t.dueDate<today());
  const stageData = STAGES.map(s=>({stage:s,count:clients.filter(c=>c.stage===s).length,value:clients.filter(c=>c.stage===s).reduce((a,c)=>a+c.value,0)}));
  const maxVal = Math.max(...stageData.map(d=>d.value),1);
  const recent = [...interactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  // ── Smart Alerts ───────────────────────────────────────────────────────────
  const alerts = [];
  const now = today();
  // Overdue tasks
  if(overdue.length>0) alerts.push({type:"danger",icon:"⚠️",msg:`${overdue.length} tarefa${overdue.length>1?"s":""} vencida${overdue.length>1?"s":""} — ação imediata necessária`});
  // Leads without contact > 7 days
  clients.filter(c=>c.stage!=="Fechado").forEach(c=>{
    const lastInt = interactions.filter(i=>i.clientId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(lastInt){
      const diff = Math.floor((new Date(now)-new Date(lastInt.date))/(1000*60*60*24));
      if(diff>=14) alerts.push({type:"warning",icon:"🔕",msg:`${c.name} está há ${diff} dias sem contato`,clientId:c.id});
    }
  });
  // Hot leads (score >= 70) without tasks
  Object.entries(leadScores).forEach(([id,s])=>{
    if(s.score>=70){
      const hasPending = tasks.some(t=>t.clientId===Number(id)&&!t.done);
      if(!hasPending){
        const c = clients.find(x=>x.id===Number(id));
        if(c) alerts.push({type:"info",icon:"🔥",msg:`${c.name} tem score ${s.score}% — sem tarefas pendentes`});
      }
    }
  });
  // Hot leads in proposal for > 10 days
  clients.filter(c=>c.stage==="Proposta").forEach(c=>{
    const lastInt = interactions.filter(i=>i.clientId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(lastInt){
      const diff = Math.floor((new Date(now)-new Date(lastInt.date))/(1000*60*60*24));
      if(diff>=10) alerts.push({type:"warning",icon:"💼",msg:`${c.name} está em Proposta há ${diff} dias sem movimentação`});
    }
  });

  const alertColors = {danger:"rgba(255,45,120,0.12)",warning:"rgba(255,184,0,0.1)",info:"rgba(0,212,255,0.08)"};
  const alertBorders = {danger:"rgba(255,45,120,0.4)",warning:"rgba(255,184,0,0.3)",info:"rgba(0,212,255,0.2)"};
  const alertTextColors = {danger:"#ff2d78",warning:"#ffb800",info:"#00d4ff"};

  // Top leads by score
  const topLeads = clients
    .filter(c=>leadScores[c.id])
    .map(c=>({...c, score:leadScores[c.id]}))
    .sort((a,b)=>(b.score.score||0)-(a.score.score||0))
    .slice(0,5);

  return (
    <div className="fade-in">
      <div style={{marginBottom:32,display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:2,lineHeight:1,marginBottom:6}}><GradText>Visão Geral</GradText></div>
          <p style={{color:"#7a9bb5",margin:0,fontSize:14}}>Bem-vindo de volta. Aqui está o resumo do pipeline da VIVAI.</p>
        </div>
        <button onClick={onAnalyze} disabled={analyzing}
          style={{padding:"9px 18px",borderRadius:8,border:"1px solid rgba(0,212,255,0.3)",
            background:analyzing?"rgba(0,212,255,0.05)":"rgba(0,212,255,0.08)",
            color:"#00d4ff",fontSize:13,fontWeight:600,cursor:analyzing?"wait":"pointer",
            fontFamily:"'Barlow',sans-serif",display:"flex",alignItems:"center",gap:6}}>
          {analyzing?"⏳ Analisando...":"🧠 Analisar todos os leads"}
        </button>
      </div>

      {/* Smart Alerts */}
      {alerts.length>0&&(
        <div style={{marginBottom:24,display:"flex",flexDirection:"column",gap:8}}>
          {alerts.slice(0,4).map((a,i)=>(
            <div key={i} style={{padding:"10px 16px",borderRadius:10,
              background:alertColors[a.type],border:`1px solid ${alertBorders[a.type]}`,
              display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:16}}>{a.icon}</span>
              <span style={{fontSize:13,color:alertTextColors[a.type]}}>{a.msg}</span>
            </div>
          ))}
        </div>
      )}

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:28}}>
        <KpiCard icon="🎬" label="Pipeline Total" value={fmt(totalPipeline)} sub={`${clients.length} clientes ativos`} gradient="linear-gradient(90deg,#00d4ff,#0066ff)"/>
        <KpiCard icon="🏆" label="Fechados" value={fmt(closedValue)} sub={`${closed.length} contratos`} gradient="linear-gradient(90deg,#ffb800,#ff6b35)"/>
        <KpiCard icon="⚡" label="Tarefas Pendentes" value={pending.length} sub={overdue.length>0?`⚠ ${overdue.length} em atraso`:"Tudo em dia"} gradient={overdue.length>0?"linear-gradient(90deg,#ff2d78,#ff6b35)":"linear-gradient(90deg,#00d4ff,#00b800)"}/>
        <KpiCard icon="💬" label="Interações" value={interactions.length} sub="Total registrado" gradient="linear-gradient(90deg,#ff2d78,#ff6b35)"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
        {/* Pipeline */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:18,textTransform:"uppercase"}}>Pipeline por Etapa</div>
          {stageData.map(d=>(
            <div key={d.stage} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:500,color:"#e8f4f8"}}>{d.stage}</span>
                <span style={{fontSize:12,color:"#7a9bb5"}}>{d.count} · {fmt(d.value)}</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:3,height:6,overflow:"hidden"}}>
                <div style={{width:`${(d.value/maxVal)*100}%`,height:"100%",background:`linear-gradient(90deg,${STAGE_COLORS[d.stage]},${STAGE_COLORS[d.stage]}88)`,borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Recent interactions */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:18,textTransform:"uppercase"}}>Últimas Interações</div>
          {recent.map(i=>{
            const client=clients.find(c=>c.id===i.clientId);
            return(
              <div key={i.id} style={{display:"flex",gap:12,marginBottom:14,paddingBottom:14,borderBottom:"1px solid rgba(0,212,255,0.08)"}}>
                {client&&<Avatar name={client.name} size={34}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#e8f4f8",marginBottom:2}}>{client?.name}</div>
                  <div style={{fontSize:12,color:"#7a9bb5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.note}</div>
                </div>
                <Badge label={i.type} color="#00d4ff"/>
              </div>
            );
          })}
        </div>
      </div>

      {/* Lead Scores — só aparece após análise */}
      {topLeads.length>0&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:16,textTransform:"uppercase"}}>🎯 Ranking de Leads — Score de Fechamento</div>
          <div style={{display:"grid",gap:10}}>
            {topLeads.map(c=>{
              const s = c.score;
              const tempColor = s.temp==="quente"?"#ff2d78":s.temp==="morno"?"#ffb800":"#7a9bb5";
              const tempIcon = s.temp==="quente"?"🔥":s.temp==="morno"?"🌤":"❄️";
              return(
                <div key={c.id} style={{display:"flex",gap:14,alignItems:"center",padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)"}}>
                  <Avatar name={c.name} size={36}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#e8f4f8"}}>{c.name}</div>
                    <div style={{fontSize:12,color:"#7a9bb5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.summary}</div>
                  </div>
                  <span style={{fontSize:16}}>{tempIcon}</span>
                  <div style={{textAlign:"right",minWidth:60}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:tempColor,lineHeight:1}}>{s.score}%</div>
                    <div style={{fontSize:10,color:"#7a9bb5"}}>chance</div>
                  </div>
                  {/* Score bar */}
                  <div style={{width:80,background:"rgba(255,255,255,0.08)",borderRadius:4,height:6,overflow:"hidden"}}>
                    <div style={{width:`${s.score}%`,height:"100%",background:tempColor,borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// Simple markdown renderer for AI responses
function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.*$)/gm, '<div style="font-size:13px;font-weight:700;color:#00d4ff;margin:10px 0 4px">$1</div>')
    .replace(/^## (.*$)/gm,  '<div style="font-size:14px;font-weight:700;color:#e8f4f8;margin:12px 0 4px">$1</div>')
    .replace(/^# (.*$)/gm,   '<div style="font-size:15px;font-weight:700;color:#00d4ff;margin:12px 0 6px">$1</div>')
    .replace(/^• (.*$)/gm,   '<div style="padding:2px 0 2px 14px;border-left:2px solid rgba(0,212,255,0.3);margin:3px 0;color:#b0ccd8">$1</div>')
    .replace(/^- (.*$)/gm,   '<div style="padding:2px 0 2px 14px;border-left:2px solid rgba(0,212,255,0.3);margin:3px 0;color:#b0ccd8">$1</div>')
    .replace(/^\d+\. (.*$)/gm,'<div style="padding:2px 0 2px 14px;margin:3px 0;color:#b0ccd8">$1</div>')
    .replace(/\n\n/g, '<div style="height:8px"></div>')
    .replace(/\n/g, '<br/>');
}

function LeadPanel({client, clients, interactions, tasks, allTasks, setClients, setInteractions, setTasks, onClose, onUpdateClient}) {
  const [tab, setTab] = React.useState("overview");
  const [chatHistory, setChatHistory] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("chat_"+client.id)||"[]"); } catch { return []; }
  });
  const [chatInput, setChatInput] = React.useState("");
  const [chatLoading, setChatLoading] = React.useState(false);
  const [addingInteraction, setAddingInteraction] = React.useState(false);
  const [iForm, setIForm] = React.useState({type:"WhatsApp",note:""});
  const [addingTask, setAddingTask] = React.useState(false);
  const [tForm, setTForm] = React.useState({title:"",dueDate:today(),priority:"Média"});
  const [editStage, setEditStage] = React.useState(false);
  const [editingClient, setEditingClient] = React.useState(false);
  const [editForm, setEditForm] = React.useState({...client});
  const [copiedIdx, setCopiedIdx] = React.useState(null);
  const chatEndRef = React.useRef(null);

  React.useEffect(()=>{
    try { localStorage.setItem("chat_"+client.id, JSON.stringify(chatHistory)); } catch {}
    chatEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[chatHistory]);

  const typeIcon = {Ligação:"📞","E-mail":"✉️",Reunião:"🤝",WhatsApp:"💬",Visita:"🏢",Orçamento:"💰","IA Copiloto":"🤖"};
  const prioColor = {Alta:"#ff2d78",Média:"#ffb800",Baixa:"#00d4ff"};

  const saveInteraction = () => {
    const ni = {id:Date.now(),clientId:client.id,clientName:client.name,...iForm,author:"VIVAI",date:today()};
    setInteractions(p=>[ni,...p]);
    setIForm({type:"WhatsApp",note:""});
    setAddingInteraction(false);
  };
  const saveTask = () => {
    const nt = {id:Date.now(),clientId:client.id,clientName:client.name,...tForm,assignee:"VIVAI",done:false,notes:"",createdAt:today()};
    setTasks(p=>[...p,nt]);
    setTForm({title:"",dueDate:today(),priority:"Média"});
    setAddingTask(false);
  };
  const toggleTask = id => setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const changeStage = stage => { onUpdateClient({...client,stage}); setEditStage(false); };
  const saveClientEdit = () => {
    const updated = {...editForm, value:Number(editForm.value)||0, tags:typeof editForm.tags==="string"?editForm.tags.split(",").map(t=>t.trim()).filter(Boolean):editForm.tags||[]};
    onUpdateClient(updated);
    setEditingClient(false);
  };

  const buildContext = () => [
    `Cliente: ${client.name}`, `Empresa: ${client.company||"—"}`,
    `Serviço: ${client.servico||client.projeto||"—"}`,
    `Etapa: ${client.stage}`, `Valor: R$ ${(client.value||0).toLocaleString("pt-BR")}`,
    `Origem: ${client.origem||"—"}`, `Telefone: ${client.phone||"—"}`,
    "","Histórico de interações:",
    ...interactions.map(i=>`[${i.date}] ${i.type}: ${i.note}`),
    "","Tarefas:", ...tasks.map(t=>`[${t.done?"✓":"pendente"}] ${t.title} — ${t.dueDate}`),
  ].join("\n");

  const QUICK_ACTIONS = [
    {label:"💡 Próximo passo",     prompt:"Com base no histórico deste lead, qual é o melhor próximo passo? Seja direto e prático. Use títulos e bullets."},
    {label:"📱 Mensagem WhatsApp",  prompt:"Escreva uma mensagem de WhatsApp pronta para copiar. Tom profissional mas próximo. Inclua proposta de valor clara."},
    {label:"🎯 Score de fechamento",prompt:"Dê: 1) % de chance de fechar 2) 3 sinais positivos 3) 2 riscos 4) O que fazer nas próximas 48h. Use emojis e bullets."},
    {label:"⚠️ Objeções",           prompt:"Quais as principais objeções deste cliente? Como responder a cada uma? Use títulos por objeção."},
    {label:"🌡️ Temperatura",       prompt:"Classifique como QUENTE 🔥, MORNO 🌤️ ou FRIO ❄️. Explique em tópicos. Diga o que fazer baseado na temperatura."},
    {label:"✍️ E-mail proposta",    prompt:"Escreva um e-mail profissional de proposta. Inclua: Assunto, Corpo, Assinatura VIVAI Studio. Use formatação clara."},
  ];

  const sendChat = async (msg) => {
    if(!msg.trim()||chatLoading) return;
    const userMsg = {role:"user", content:msg};
    const newHistory = [...chatHistory, userMsg];
    setChatHistory(newHistory);
    setChatInput("");
    setChatLoading(true);
    try {
      const res = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({max_tokens:700,
          system:`Você é o assistente de vendas da VIVAI Studio Audiovisual.
Responda SEMPRE em português brasileiro, de forma direta e bem formatada.
Use **negrito**, ## títulos, bullets (•), emojis e estrutura clara nas respostas.
Contexto do cliente:\n${buildContext()}`,
          messages:newHistory})});
      const data = await res.json();
      const reply = data.content?.find(b=>b.type==="text")?.text||"Erro ao obter resposta.";
      const assistantMsg = {role:"assistant",content:reply};
      setChatHistory(p=>[...p,assistantMsg]);
      // Save AI interaction to CRM
      const aiInt = {id:Date.now(),clientId:client.id,clientName:client.name,
        type:"IA Copiloto",note:`Pergunta: ${msg}\n\nResposta: ${reply.slice(0,300)}${reply.length>300?"...":""}`,
        author:"IA",date:today()};
      setInteractions(p=>[aiInt,...p]);
    } catch(e) {
      setChatHistory(p=>[...p,{role:"assistant",content:"❌ Erro de conexão. Tente novamente."}]);
    }
    setChatLoading(false);
  };

  const copyMsg = (text, idx) => {
    navigator.clipboard.writeText(text);
    setCopiedIdx(idx);
    setTimeout(()=>setCopiedIdx(null),2000);
  };

  const inp2 = {background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:13,padding:"8px 10px",outline:"none",fontFamily:"'Barlow',sans-serif",width:"100%",boxSizing:"border-box"};

  // ── Context summary ─────────────────────────────────────────────────────────
  const lastInt = [...interactions].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const daysSinceContact = lastInt ? Math.floor((new Date(today())-new Date(lastInt.date))/(86400000)) : null;
  const pendingTasks = tasks.filter(t=>!t.done);

  return (
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(13,31,45,0.7)",cursor:"pointer"}}/>
      <div style={{width:520,background:"#0d1f2d",borderLeft:"1px solid rgba(0,212,255,0.2)",display:"flex",flexDirection:"column",height:"100vh"}}>

        {/* Header */}
        <div style={{padding:"18px 20px 14px",borderBottom:"1px solid rgba(0,212,255,0.1)",flexShrink:0}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <Avatar name={client.name} size={44}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:16,color:"#e8f4f8"}}>{client.name}</div>
              <div style={{fontSize:12,color:"#7a9bb5"}}>{client.company}{client.phone?` · ${client.phone}`:""}</div>
              <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                {editStage
                  ? <select autoFocus value={client.stage} onChange={e=>changeStage(e.target.value)} onBlur={()=>setEditStage(false)} style={{...inp2,width:"auto",padding:"3px 8px",fontSize:12}}>
                      {STAGES.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  : <span onClick={()=>setEditStage(true)} title="Clique para mudar etapa" style={{cursor:"pointer"}}><Badge label={client.stage} color={STAGE_COLORS[client.stage]}/></span>
                }
                {client.value>0&&<span style={{fontSize:12,color:"#ffb800",fontWeight:600}}>R$ {client.value.toLocaleString("pt-BR")}</span>}
                {client.email&&<span style={{fontSize:11,color:"#7a9bb5"}}>{client.email}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>setEditingClient(!editingClient)} title="Editar dados"
                style={{background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:6,padding:"5px 8px",color:"#00d4ff",cursor:"pointer",fontSize:12}}>✏️</button>
              <button onClick={onClose} style={{background:"none",border:"none",color:"#7a9bb5",cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
            </div>
          </div>

          {/* Inline edit form */}
          {editingClient&&(
            <div style={{marginTop:12,padding:"12px",background:"rgba(0,212,255,0.04)",borderRadius:10,border:"1px solid rgba(0,212,255,0.15)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                {[["name","Nome"],["company","Empresa"],["phone","Telefone"],["email","E-mail"],["value","Valor (R$)"],["origem","Origem"],["servico","Serviço de interesse"],["projeto","Projeto"]].map(([f,l])=>(
                  <div key={f}>
                    <div style={{fontSize:10,color:"#7a9bb5",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
                    <input value={editForm[f]||""} onChange={e=>setEditForm(p=>({...p,[f]:e.target.value}))} style={{...inp2,padding:"6px 8px",fontSize:12}}/>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:10,color:"#7a9bb5",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>Tags (vírgula)</div>
                <input value={Array.isArray(editForm.tags)?editForm.tags.join(", "):editForm.tags||""} onChange={e=>setEditForm(p=>({...p,tags:e.target.value}))} style={{...inp2,padding:"6px 8px",fontSize:12}} placeholder="VIP, Recorrente..."/>
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button onClick={()=>setEditingClient(false)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#7a9bb5",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                <button onClick={saveClientEdit} style={{padding:"5px 14px",borderRadius:6,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Salvar</button>
              </div>
            </div>
          )}

          {/* Context summary strip */}
          <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
            {daysSinceContact!==null&&(
              <div style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:daysSinceContact>14?"rgba(255,45,120,0.15)":"rgba(0,212,255,0.08)",color:daysSinceContact>14?"#ff2d78":"#7a9bb5",border:`1px solid ${daysSinceContact>14?"rgba(255,45,120,0.3)":"rgba(0,212,255,0.15)"}`}}>
                {daysSinceContact===0?"Contato hoje":daysSinceContact===1?"Contato ontem":`Último contato: ${daysSinceContact}d atrás`}
              </div>

            {pendingTasks.length>0&&<div style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(255,184,0,0.1)",color:"#ffb800",border:"1px solid rgba(255,184,0,0.3)"}}>{pendingTasks.length} tarefa{pendingTasks.length>1?"s":""} pendente{pendingTasks.length>1?"s":""}</div>}
            {interactions.length>0&&<div style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(255,255,255,0.04)",color:"#7a9bb5",border:"1px solid rgba(255,255,255,0.08)"}}>{interactions.length} interaç{interactions.length>1?"ões":"ão"}</div>}
            {client.origem&&<div style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(255,45,120,0.08)",color:"#ff6b8a",border:"1px solid rgba(255,45,120,0.2)"}}>{client.origem}</div>}
            {client.tags?.map(t=><div key={t} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(255,184,0,0.08)",color:"rgba(255,184,0,0.9)",border:"1px solid rgba(255,184,0,0.2)"}}>{t}</div>)}
          </div>

            💰 Orçamento

            + Interação
          </button>
          <button onClick={()=>setAddingTask(true)}
            style={{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(0,212,255,0.2)",background:"transparent",color:"#7a9bb5",fontSize:11,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
            + Tarefa
          </button>
          <button onClick={()=>setTab("chat")}
            style={{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(255,45,120,0.3)",background:"rgba(255,45,120,0.06)",color:"#ff2d78",fontSize:11,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
            🤖 IA
          </button>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid rgba(0,212,255,0.1)",flexShrink:0}}>
          {[["overview","📋 Histórico"],["chat","🤖 IA Copiloto"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"11px",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Barlow',sans-serif",

              borderBottom:tab===t?"2px solid #00d4ff":"2px solid transparent"}}>
              {l}

          ))}
        </div>

        {/* Tab Overview */}
        {tab==="overview"&&(
          <div style={{flex:1,padding:"14px 18px",overflowY:"auto"}}>

            {/* Add interaction */}
            {addingInteraction&&(
              <div style={{marginBottom:14,padding:"12px",background:"rgba(0,212,255,0.05)",borderRadius:10,border:"1px solid rgba(0,212,255,0.2)"}}>
                <select value={iForm.type} onChange={e=>setIForm(p=>({...p,type:e.target.value}))} style={{...inp2,marginBottom:8}}>
                  {["Ligação","E-mail","Reunião","WhatsApp","Visita"].map(t=><option key={t}>{t}</option>)}
                </select>
                <textarea value={iForm.note} onChange={e=>setIForm(p=>({...p,note:e.target.value}))} placeholder="O que aconteceu?" rows={2} style={{...inp2,resize:"vertical",marginBottom:8}}/>

            {addingTask&&(
              <div style={{marginBottom:14,padding:"12px",background:"rgba(0,212,255,0.05)",borderRadius:10,border:"1px solid rgba(0,212,255,0.2)"}}>

                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <input type="date" value={tForm.dueDate} onChange={e=>setTForm(p=>({...p,dueDate:e.target.value}))} style={{...inp2,flex:1}}/>
                  <select value={tForm.priority} onChange={e=>setTForm(p=>({...p,priority:e.target.value}))} style={{...inp2,width:"auto"}}>
                    {["Alta","Média","Baixa"].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setAddingTask(false)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#7a9bb5",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                  <button onClick={saveTask} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Salvar</button>
                </div>
              </div>
            )}

            {/* Interactions timeline */}
            {interactions.length>0&&(
              <div style={{marginBottom:18}}>
                <div style={{fontSize:10,color:"#7a9bb5",marginBottom:10,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>Interações ({interactions.length})</div>
                {[...interactions].sort((a,b)=>b.date.localeCompare(a.date)).map(i=>(
                  <div key={i.id} style={{display:"flex",gap:10,marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(0,212,255,0.06)"}}>
                    <span style={{fontSize:16,flexShrink:0,marginTop:2}}>{typeIcon[i.type]||"💬"}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:8,marginBottom:3,alignItems:"center"}}>
                        <span style={{fontSize:11,color:"#7a9bb5"}}>{i.date}</span>
                        <Badge label={i.type} color="#00d4ff"/>
                        <span style={{fontSize:11,color:"#7a9bb5"}}>· {i.author}</span>
                      </div>
                      <div style={{fontSize:13,color:"#b0ccd8",lineHeight:1.5,whiteSpace:"pre-line"}}>{i.note}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Tasks */}
            {tasks.length>0&&(
              <div>
                <div style={{fontSize:10,color:"#7a9bb5",marginBottom:10,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>Tarefas ({tasks.length})</div>
                {tasks.map(t=>(
                  <div key={t.id} style={{display:"flex",gap:10,marginBottom:8,alignItems:"center",padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)",border:`1px solid ${t.dueDate<today()&&!t.done?"rgba(255,45,120,0.2)":"rgba(255,255,255,0.06)"}`}}>
                    <button onClick={()=>toggleTask(t.id)} style={{width:18,height:18,borderRadius:4,border:`2px solid ${t.done?"#00d4ff":"rgba(0,212,255,0.3)"}`,background:t.done?"rgba(0,212,255,0.2)":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#00d4ff"}}>{t.done&&"✓"}</button>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#e8f4f8",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                      <div style={{fontSize:11,color:"#7a9bb5"}}>{t.dueDate} · {t.priority}{t.notes&&" · 📌 tem notas"}</div>
                    </div>
                    <Badge label={t.priority} color={prioColor[t.priority]}/>
                  </div>
                ))}
              </div>
            )}

            {interactions.length===0&&tasks.length===0&&(
              <div style={{textAlign:"center",padding:"32px 0",color:"#7a9bb5",fontSize:13}}>
                Sem histórico ainda.<br/>
                <span style={{color:"#00d4ff",cursor:"pointer"}} onClick={()=>setTab("chat")}>Pergunte à IA o que fazer →</span>
              </div>
            )}
          </div>
        )}

        {/* Tab AI Chat */}
        {tab==="chat"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

            {/* Quick actions */}
            {chatHistory.length===0&&(
              <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(0,212,255,0.08)",flexShrink:0}}>
                <div style={{fontSize:10,color:"#7a9bb5",marginBottom:8,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>Ações rápidas</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {QUICK_ACTIONS.map(a=>(
                    <button key={a.label} onClick={()=>sendChat(a.prompt)}
                      style={{padding:"8px 8px",borderRadius:8,border:"1px solid rgba(0,212,255,0.2)",background:"rgba(0,212,255,0.04)",color:"#b0ccd8",fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"'Barlow',sans-serif",lineHeight:1.4}}>
                      {a.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Messages */}
            <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
              {chatHistory.map((m,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",flexDirection:m.role==="user"?"row-reverse":"row"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:m.role==="user"?"rgba(0,212,255,0.2)":"rgba(255,45,120,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
                    {m.role==="user"?"👤":"🤖"}
                  </div>
                  <div style={{maxWidth:"85%"}}>
                    <div style={{padding:"10px 12px",borderRadius:10,fontSize:13,lineHeight:1.6,
                      background:m.role==="user"?"rgba(0,212,255,0.1)":"rgba(255,255,255,0.04)",
                      color:"#e8f4f8",border:`1px solid ${m.role==="user"?"rgba(0,212,255,0.2)":"rgba(255,255,255,0.08)"}`}}
                      dangerouslySetInnerHTML={m.role==="assistant"?{__html:renderMarkdown(m.content)}:undefined}>
                      {m.role==="user"?m.content:null}
                    </div>
                    {m.role==="assistant"&&(
                      <button onClick={()=>copyMsg(m.content,i)}
                        style={{marginTop:3,background:"none",border:"none",color:copiedIdx===i?"#00d4ff":"#7a9bb5",fontSize:11,cursor:"pointer",padding:"2px 6px"}}>
                        {copiedIdx===i?"✓ copiado":"📋 copiar"}
                      </button>
                    )}
                  </div>
                </div>
              ))}
              {chatLoading&&(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:"rgba(255,45,120,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div>
                  <div style={{padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#7a9bb5",fontSize:13}}>Analisando...</div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>

            {/* Input */}
            <div style={{padding:"10px 16px",borderTop:"1px solid rgba(0,212,255,0.08)",flexShrink:0}}>
              <div style={{display:"flex",gap:8}}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat(chatInput);}}}
                  placeholder={`Pergunte sobre ${client.name}...`} style={{...inp2,flex:1}}/>
                <button onClick={()=>sendChat(chatInput)} disabled={chatLoading||!chatInput.trim()}
                  style={{padding:"8px 16px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",opacity:chatLoading?0.5:1}}>→</button>
              </div>
              {chatHistory.length>0&&(
                <button onClick={()=>{setChatHistory([]);try{localStorage.removeItem("chat_"+client.id);}catch{}}}
                  style={{marginTop:6,background:"none",border:"none",color:"#7a9bb5",fontSize:11,cursor:"pointer",width:"100%",textAlign:"center"}}>
                  Limpar conversa
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function Clients({clients, setClients, interactions, setInteractions, tasks, setTasks, leadScores={}}) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [panel, setPanel] = useState(null); // selected client for detail panel
  const filtered = clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.company.toLowerCase().includes(search.toLowerCase()));

  const openNew = () => { setForm({name:"",email:"",phone:"",company:"",stage:"Lead",value:"",tags:""}); setModal("new"); };
  const openEdit = c => { setForm({...c,tags:c.tags?.join(", ")||""}); setModal(c); };
  const save = () => {
    const data = {...form,value:Number(form.value)||0,tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):[]};
    if(modal==="new") setClients(p=>[...p,{...data,id:Date.now(),createdAt:today()}]);
    else setClients(p=>p.map(c=>c.id===modal.id?{...c,...data}:c));
    setModal(null);
  };
  const del = id => { if(confirm("Remover cliente?")) setClients(p=>p.filter(c=>c.id!==id)); };

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Clientes</GradText></div>
        <Btn onClick={openNew}>+ Novo Cliente</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar cliente ou empresa..."
        style={{...fldStyle,width:"100%",marginBottom:16,padding:"11px 16px",fontSize:14,borderRadius:10}}/>
      <div style={{display:"grid",gap:10}}>
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>setPanel(c)}
            style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,transition:"border-color 0.2s",cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.35)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.12)"}
          >
            <Avatar name={c.name} size={42}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontWeight:600,fontSize:15,color:"#e8f4f8"}}>{c.name}</div>
                {leadScores[c.id]&&<span title={`Score: ${leadScores[c.id].score}%`} style={{fontSize:14,cursor:"default"}}>
                  {leadScores[c.id].temp==="quente"?"🔥":leadScores[c.id].temp==="morno"?"🌤":"❄️"}
                </span>}
              </div>
              <div style={{fontSize:12,color:"#7a9bb5"}}>{c.company}{c.email?` · ${c.email}`:""}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
              <Badge label={c.stage} color={STAGE_COLORS[c.stage]}/>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:"#ffb800"}}>{fmt(c.value)}</span>
              {c.tags?.map(t=><Badge key={t} label={t} color="#ff2d78"/>)}
            </div>
            <div style={{display:"flex",gap:8}} onClick={e=>e.stopPropagation()}>
              <button onClick={e=>{e.stopPropagation();window.open(`/quote?id=${c.id}`,'_blank');}}
                style={{background:"rgba(255,184,0,0.1)",border:"1px solid rgba(255,184,0,0.35)",
                  borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,color:"#ffb800",fontWeight:600}}>💰 Orçar</button>
              <button onClick={e=>{e.stopPropagation();openEdit(c);}} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,color:"#00d4ff"}}>Editar</button>
              <button onClick={e=>{e.stopPropagation();del(c.id);}} style={{background:"rgba(255,45,120,0.1)",border:"1px solid rgba(255,45,120,0.3)",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,color:"#ff2d78"}}>✕</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div style={{textAlign:"center",padding:48,color:"#7a9bb5"}}>Nenhum cliente encontrado.</div>}
      </div>

      {modal&&<Modal title={modal==="new"?"Novo Cliente":"Editar Cliente"} onClose={()=>setModal(null)}>
        <Field label="Nome completo" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="João Silva"/>
        <Field label="E-mail" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
        <Field label="Telefone" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/>
        <Field label="Empresa" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))}/>
        <SelField label="Etapa" value={form.stage} onChange={e=>setForm(p=>({...p,stage:e.target.value}))} options={STAGES}/>
        <Field label="Valor (R$)" type="number" value={form.value} onChange={e=>setForm(p=>({...p,value:e.target.value}))}/>
        <Field label="Tags (vírgula)" value={form.tags} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="VIP, Recorrente"/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn>
          <Btn onClick={save}>Salvar</Btn>
        </div>
      </Modal>}

      {panel&&<LeadPanel
        client={panel}
        clients={clients}
        interactions={interactions.filter(i=>i.clientId===panel.id)}
        tasks={tasks.filter(t=>t.clientId===panel.id)}
        allTasks={tasks}
        setClients={setClients}
        setInteractions={setInteractions}
        setTasks={setTasks}
        onClose={()=>setPanel(null)}
        onUpdateClient={updated=>{setClients(p=>p.map(c=>c.id===updated.id?updated:c));setPanel(updated);}}
      />}
    </div>
  );
}


function Pipeline({clients, setClients, interactions, setInteractions, tasks, setTasks}) {
  const [dragging, setDragging] = useState(null);
  const [over, setOver]         = useState(null);
  const [panel, setPanel]       = useState(null);
  const drop = stage => { if(dragging) setClients(p=>p.map(c=>c.id===dragging?{...c,stage}:c)); setDragging(null); setOver(null); };

  return (
    <div className="fade-in">
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2,marginBottom:4}}><GradText>Pipeline</GradText></div>
        <div style={{color:"#7a9bb5",fontSize:13}}>Arraste para mover · Clique no card para abrir</div>
      </div>
      <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:16}}>
        {STAGES.map(stage=>{
          const cols = clients.filter(c=>c.stage===stage);
          const total = cols.reduce((s,c)=>s+c.value,0);
          const isOver = over===stage;
          return (
            <div key={stage} onDragOver={e=>{e.preventDefault();setOver(stage);}} onDrop={()=>drop(stage)} onDragLeave={()=>setOver(null)}
              style={{minWidth:210,flex:"0 0 210px",background:isOver?"rgba(0,212,255,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${isOver?"rgba(0,212,255,0.4)":"rgba(0,212,255,0.1)"}`,borderRadius:12,padding:"14px 12px",transition:"all 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:STAGE_COLORS[stage]}}/>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,color:STAGE_COLORS[stage],letterSpacing:1,textTransform:"uppercase"}}>{stage}</span>
                <span style={{marginLeft:"auto",fontSize:11,color:"#7a9bb5"}}>{cols.length}</span>
              </div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"#7a9bb5",marginBottom:12}}>{fmt(total)}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {cols.map(c=>(
                  <div key={c.id} draggable onClick={()=>setPanel(c)}
                    onDragStart={e=>{e.stopPropagation();setDragging(c.id);}}
                    onDragEnd={()=>{setDragging(null);setOver(null);}}
                    style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:10,padding:"10px 12px",cursor:"pointer",transition:"border-color 0.2s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.4)"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.15)"}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <Avatar name={c.name} size={26}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:13,color:"#e8f4f8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                        <div style={{fontSize:11,color:"#7a9bb5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.company}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:"#ffb800"}}>{fmt(c.value)}</span>
                      {tasks.filter(t=>t.clientId===c.id&&!t.done).length>0&&(
                        <span style={{fontSize:10,color:"#00d4ff",background:"rgba(0,212,255,0.1)",padding:"2px 6px",borderRadius:10}}>
                          ✓ {tasks.filter(t=>t.clientId===c.id&&!t.done).length}
                        </span>
                      )}
                    </div>
                    {c.servico&&<div style={{fontSize:11,color:"#7a9bb5",marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.servico}</div>}
                  </div>
                ))}
                {cols.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"rgba(0,212,255,0.2)",fontSize:12}}>Vazio</div>}
              </div>
            </div>
          );
        })}
      </div>
      {panel&&<LeadPanel
        client={panel} clients={clients}
        interactions={interactions.filter(i=>i.clientId===panel.id)}
        tasks={tasks.filter(t=>t.clientId===panel.id)}
        allTasks={tasks} setClients={setClients}
        setInteractions={setInteractions} setTasks={setTasks}
        onClose={()=>setPanel(null)}
        onUpdateClient={updated=>{setClients(p=>p.map(c=>c.id===updated.id?updated:c));setPanel(updated);}}
      />}
    </div>
  );
}


function Interactions({interactions, setInteractions, clients}) {
  const [modal, setModal]       = useState(false);
  const [form, setForm]         = useState({clientId:"",type:"WhatsApp",date:today(),note:"",author:""});
  const [filter, setFilter]     = useState("all");
  const [expanded, setExpanded] = useState(null);
  const [editing, setEditing]   = useState(null);
  const [editNote, setEditNote] = useState("");
  const filtered = filter==="all"?interactions:interactions.filter(i=>i.type===filter);
  const sorted   = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  const save     = () => { setInteractions(p=>[...p,{...form,id:Date.now(),clientId:Number(form.clientId)}]); setModal(false); };
  const del      = id => { if(confirm("Remover interação?")) setInteractions(p=>p.filter(i=>i.id!==id)); };
  const saveEdit = id => { setInteractions(p=>p.map(i=>i.id===id?{...i,note:editNote}:i)); setEditing(null); };
  const typeIcon  = {Ligação:"📞","E-mail":"✉️",Reunião:"🤝",WhatsApp:"💬",Visita:"🏢",Orçamento:"💰","IA Copiloto":"🤖"};
  const typeColor = {Ligação:"#00d4ff","E-mail":"#ffb800",Reunião:"#ff6b35",WhatsApp:"#25D366",Visita:"#ff2d78",Orçamento:"#ffb800","IA Copiloto":"#ff2d78"};

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Interações</GradText></div>
        <Btn onClick={()=>setModal(true)}>+ Nova Interação</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {["all",...INTERACTION_TYPES].map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5,
            borderColor:filter===t?"#00d4ff":"rgba(0,212,255,0.2)",background:filter===t?"rgba(0,212,255,0.15)":"transparent",color:filter===t?"#00d4ff":"#7a9bb5"}}>
            {t==="all"?"Todos":t}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gap:8}}>
        {sorted.map(i=>{
          const client = clients.find(c=>c.id===i.clientId);
          const isExp  = expanded===i.id;
          return (
            <div key={i.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isExp?"rgba(0,212,255,0.3)":"rgba(0,212,255,0.1)"}`,borderRadius:12,overflow:"hidden",transition:"border-color 0.2s"}}>
              {/* Main row — clickable */}
              <div style={{padding:"12px 16px",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:i.id)}>
                <span style={{fontSize:22,flexShrink:0}}>{typeIcon[i.type]||"💬"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                    <span style={{fontWeight:600,fontSize:14,color:"#e8f4f8"}}>{client?.name||i.clientName}</span>
                    <Badge label={i.type} color={typeColor[i.type]||"#00d4ff"}/>
                    <span style={{fontSize:11,color:"#7a9bb5"}}>{i.date}</span>
                  </div>
                  <div style={{fontSize:13,color:"#7a9bb5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.note}</div>
                </div>
                <span style={{color:"#7a9bb5",fontSize:12}}>{isExp?"▲":"▼"}</span>
              </div>
              {/* Expanded */}
              {isExp&&(
                <div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(0,212,255,0.08)"}}>
                  {editing===i.id ? (
                    <div style={{marginTop:10}}>
                      <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} rows={3}
                        style={{width:"100%",padding:"8px 10px",background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:13,resize:"vertical",outline:"none",fontFamily:"'Barlow',sans-serif",boxSizing:"border-box",marginBottom:8}}/>
                      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                        <button onClick={()=>setEditing(null)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#7a9bb5",fontSize:12,cursor:"pointer"}}>Cancelar</button>
                        <button onClick={()=>saveEdit(i.id)} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Salvar</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{marginTop:10}}>
                      <div style={{fontSize:13,color:"#b0ccd8",lineHeight:1.6,whiteSpace:"pre-line",marginBottom:10}}>{i.note}</div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>{setEditing(i.id);setEditNote(i.note);}}
                          style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(0,212,255,0.2)",background:"transparent",color:"#00d4ff",fontSize:12,cursor:"pointer"}}>✏️ Editar</button>
                        <button onClick={()=>navigator.clipboard.writeText(i.note)}
                          style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#7a9bb5",fontSize:12,cursor:"pointer"}}>📋 Copiar</button>
                        <button onClick={()=>del(i.id)}
                          style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(255,45,120,0.2)",background:"transparent",color:"#ff2d78",fontSize:12,cursor:"pointer"}}>Excluir</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

function Tasks({tasks, setTasks, clients}) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({clientId:"",title:"",dueDate:today(),priority:"Média",assignee:""});
  const [filter, setFilter] = useState("pending");
  const [expanded, setExpanded] = useState(null);
  const filtered = filter==="pending"?tasks.filter(t=>!t.done):filter==="done"?tasks.filter(t=>t.done):tasks;
  const sorted = [...filtered].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const toggle = id => setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del = id => setTasks(p=>p.filter(t=>t.id!==id));
  const save = () => {
    setTasks(p=>[...p,{...form,id:Date.now(),clientId:Number(form.clientId),done:false,notes:""}]);
    setModal(false);
    setForm({clientId:"",title:"",dueDate:today(),priority:"Média",assignee:""});
  };
  const updateTask = (id, fields) => setTasks(p=>p.map(t=>t.id===id?{...t,...fields}:t));
  const snooze = (id, days) => {
    const t = tasks.find(x=>x.id===id);
    if(!t) return;
    const d = new Date(t.dueDate||today());
    d.setDate(d.getDate()+days);
    updateTask(id,{dueDate:d.toISOString().split("T")[0]});
  };
  const renewTask = (t) => {
    setTasks(p=>[...p,{...t,id:Date.now(),done:false,dueDate:today(),notes:"",createdAt:today()}]);
    updateTask(t.id,{done:true});
  };
  const prioColor = {Alta:"#ff2d78",Média:"#ffb800",Baixa:"#00d4ff"};

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Tarefas</GradText></div>
        <Btn onClick={()=>setModal(true)}>+ Nova Tarefa</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["pending","Pendentes"],["done","Concluídas"],["all","Todas"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5,
            borderColor:filter===v?"#00d4ff":"rgba(0,212,255,0.2)",
            background:filter===v?"rgba(0,212,255,0.15)":"transparent",
            color:filter===v?"#00d4ff":"#7a9bb5"
          }}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:8}}>
        {sorted.map(t=>{
          const client = clients.find(c=>c.id===t.clientId);
          const isOverdue = !t.done && t.dueDate<today();
          const isExp = expanded===t.id;
          return (
            <div key={t.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOverdue?"rgba(255,45,120,0.3)":isExp?"rgba(0,212,255,0.3)":"rgba(0,212,255,0.1)"}`,borderRadius:12,overflow:"hidden",opacity:t.done?0.55:1,transition:"all 0.2s"}}>
              {/* Main row */}
              <div style={{padding:"13px 16px",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}
                onClick={()=>setExpanded(isExp?null:t.id)}>
                <button onClick={e=>{e.stopPropagation();toggle(t.id);}} style={{width:22,height:22,borderRadius:5,border:`2px solid ${t.done?"#00d4ff":"rgba(0,212,255,0.3)"}`,background:t.done?"rgba(0,212,255,0.2)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#00d4ff",flexShrink:0,fontSize:12}}>
                  {t.done&&"✓"}
                </button>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#e8f4f8",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                  <div style={{fontSize:11,color:"#7a9bb5",marginTop:2}}>
                    {client?.name} · {t.assignee}{isOverdue?<span style={{color:"#ff2d78"}}> · ⚠ Vencida {t.dueDate}</span>:` · ${t.dueDate}`}
                    {t.notes&&<span style={{color:"#00d4ff"}}> · 📌 tem notas</span>}
                  </div>
                </div>
                <Badge label={t.priority} color={prioColor[t.priority]}/>
                <span style={{color:"#7a9bb5",fontSize:12,marginLeft:4}}>{isExp?"▲":"▼"}</span>
              </div>

              {/* Expanded area */}
              {isExp&&(
                <div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(0,212,255,0.1)"}}>
                  {/* Notes */}
                  <div style={{marginTop:12,marginBottom:12}}>
                    <div style={{fontSize:11,color:"#7a9bb5",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Observações</div>
                    <textarea value={t.notes||""} onChange={e=>updateTask(t.id,{notes:e.target.value})}
                      placeholder="Adicione contexto, o que aconteceu, próximo passo..."
                      rows={2} style={{width:"100%",padding:"8px 10px",background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:13,resize:"vertical",outline:"none",fontFamily:"'Barlow',sans-serif",boxSizing:"border-box"}}/>
                  </div>

                  {/* Actions */}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <div style={{fontSize:11,color:"#7a9bb5",display:"flex",alignItems:"center",marginRight:4}}>Reagendar:</div>
                    {[[1,"Amanhã"],[3,"+3 dias"],[7,"+1 sem"]].map(([d,l])=>(
                      <button key={d} onClick={()=>snooze(t.id,d)}
                        style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(0,212,255,0.25)",background:"transparent",color:"#00d4ff",fontSize:12,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
                        {l}
                      </button>
                    ))}
                    <input type="date" value={t.dueDate||""} onChange={e=>updateTask(t.id,{dueDate:e.target.value})}
                      style={{padding:"3px 8px",borderRadius:6,border:"1px solid rgba(0,212,255,0.2)",background:"rgba(0,212,255,0.05)",color:"#e8f4f8",fontSize:12,outline:"none"}}/>
                    <div style={{flex:1}}/>
                    {!t.done&&<button onClick={()=>renewTask(t)}
                      style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(255,184,0,0.35)",background:"rgba(255,184,0,0.08)",color:"#ffb800",fontSize:12,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
                      🔁 Concluir e renovar
                    </button>}
                    <button onClick={()=>del(t.id)}
                      style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(255,45,120,0.3)",background:"transparent",color:"#ff2d78",fontSize:12,cursor:"pointer"}}>
                      Excluir
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",padding:48,color:"#7a9bb5"}}>Nenhuma tarefa aqui.</div>}
      </div>

      {modal&&<Modal title="Nova Tarefa" onClose={()=>setModal(false)}>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Cliente</label>
          <select value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} style={fldStyle}>
            <option value="">Selecione...</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <Field label="Título da tarefa" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
        <Field label="Data limite" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/>
        <SelField label="Prioridade" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} options={TASK_PRIORITIES}/>
        <Field label="Responsável" value={form.assignee} onChange={e=>setForm(p=>({...p,assignee:e.target.value}))}/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn>
          <Btn onClick={save}>Salvar</Btn>
        </div>
      </Modal>}
    </div>
  );
}



// ══ MÓDULO FINANCEIRO ══════════════════════════════════════════════════════════

function Finance({clients, setClients}) {
  const today_str = today();
  const curMonth = today_str.slice(0,7);
  const curYear  = today_str.slice(0,4);

  // ── State ──────────────────────────────────────────────────────────────────
  const [payments, setPayments] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("vivai_payments")||"[]"); } catch { return []; }
  });
  const [modal, setModal]     = React.useState(null); // null | 'add' | payment
  const [form, setForm]       = React.useState({clientId:"",desc:"",total:"",parcelas:1,startDate:today_str,status:"pendente"});
  const [viewMonth, setViewMonth] = React.useState(curMonth);
  const [tab, setTab]         = React.useState("overview"); // overview | projects | cashflow

  const savePayments = (p) => {
    setPayments(p);
    try { localStorage.setItem("vivai_payments", JSON.stringify(p)); } catch {}
  };

  // ── Derived data ───────────────────────────────────────────────────────────
  // Each payment has: id, clientId, desc, total, parcelas, startDate, status, installments[]
  // installments[]: {num, value, dueDate, paidDate, paid}

  const allInstallments = payments.flatMap(p =>
    (p.installments||[]).map(i => ({...i, project: p, client: clients.find(c=>c.id===p.clientId)}))
  );

  const monthInstallments = allInstallments.filter(i => i.dueDate?.slice(0,7) === viewMonth);
  const monthReceived  = monthInstallments.filter(i=>i.paid).reduce((s,i)=>s+i.value,0);
  const monthPending   = monthInstallments.filter(i=>!i.paid).reduce((s,i)=>s+i.value,0);
  const monthTotal     = monthReceived + monthPending;

  const overdue = allInstallments.filter(i=>!i.paid && i.dueDate < today_str);
  const overdueTotal = overdue.reduce((s,i)=>s+i.value,0);

  const totalReceived = allInstallments.filter(i=>i.paid).reduce((s,i)=>s+i.value,0);
  const totalPipeline = allInstallments.filter(i=>!i.paid).reduce((s,i)=>s+i.value,0);

  // Ticket médio por projeto fechado
  const closedProjects = payments.filter(p=>p.status==="pago"||p.installments?.every(i=>i.paid));
  const ticketMedio = closedProjects.length>0 ? closedProjects.reduce((s,p)=>s+p.total,0)/closedProjects.length : 0;

  // Monthly chart data — last 6 months
  const monthChart = [];
  for(let m=5;m>=0;m--){
    const d = new Date(); d.setMonth(d.getMonth()-m);
    const ym = d.toISOString().slice(0,7);
    const label = d.toLocaleString("pt-BR",{month:"short"}).replace(".","");
    const rec = allInstallments.filter(i=>i.paid&&i.paidDate?.slice(0,7)===ym).reduce((s,i)=>s+i.value,0);
    const pend = allInstallments.filter(i=>!i.paid&&i.dueDate?.slice(0,7)===ym).reduce((s,i)=>s+i.value,0);
    monthChart.push({label,received:rec,pending:pend,ym});
  }
  const maxChart = Math.max(...monthChart.map(m=>m.received+m.pending),1);

  // ── Helpers ────────────────────────────────────────────────────────────────
  const genInstallments = (total, n, startDate) => {
    const val = Math.round(total/n*100)/100;
    return Array.from({length:n},(_, i)=>{
      const d = new Date(startDate+"T12:00:00");
      d.setDate(d.getDate()+i*30);
      return {num:i+1, value:val, dueDate:d.toISOString().split("T")[0], paid:false, paidDate:null};
    });
  };

  const addPayment = () => {
    const total = parseFloat(String(form.total).replace(",","."))||0;
    const p = {
      id: Date.now(), clientId: Number(form.clientId),
      desc: form.desc, total,
      parcelas: Number(form.parcelas)||1,
      startDate: form.startDate,
      status: "ativo",
      installments: genInstallments(total, Number(form.parcelas)||1, form.startDate),
      createdAt: today_str,
    };
    savePayments([...payments, p]);
    setModal(null);
    setForm({clientId:"",desc:"",total:"",parcelas:1,startDate:today_str,status:"pendente"});
  };

  const toggleInstallment = (paymentId, instNum) => {
    savePayments(payments.map(p => p.id===paymentId ? {
      ...p,
      installments: p.installments.map(i => i.num===instNum ? {
        ...i, paid:!i.paid, paidDate: !i.paid ? today_str : null
      } : i)
    } : p));
  };

  const delPayment = (id) => {
    if(confirm("Remover projeto financeiro?")) savePayments(payments.filter(p=>p.id!==id));
  };

  const inp3 = {background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:13,padding:"8px 10px",outline:"none",fontFamily:"'Barlow',sans-serif",width:"100%",boxSizing:"border-box"};
  const statusColor = {pago:"#27AE60",ativo:"#00d4ff",atrasado:"#ff2d78"};

  // Prev/next month
  const changeMonth = (dir) => {
    const [y,m] = viewMonth.split("-").map(Number);
    const d = new Date(y,m-1+dir,1);
    setViewMonth(d.toISOString().slice(0,7));
  };
  const monthLabel = new Date(viewMonth+"-15").toLocaleString("pt-BR",{month:"long",year:"numeric"});

  return (
    <div className="fade-in">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2,lineHeight:1}}>
            <GradText>Financeiro</GradText>
          </div>
          <div style={{color:"#7a9bb5",fontSize:13,marginTop:4}}>Controle de receita, pagamentos e projeção</div>
        </div>
        <button onClick={()=>setModal("add")}
          style={{padding:"10px 20px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
          + Novo projeto
        </button>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        {[
          {icon:"💰",label:"Recebido total",   value:fmt(totalReceived),   grad:"linear-gradient(90deg,#27AE60,#00d4ff)"},
          {icon:"⏳",label:"A receber",         value:fmt(totalPipeline),   grad:"linear-gradient(90deg,#ffb800,#ff6b35)"},
          {icon:"⚠️",label:"Em atraso",         value:fmt(overdueTotal),    grad:"linear-gradient(90deg,#ff2d78,#ff6b35)"},
          {icon:"🎯",label:"Ticket médio",      value:fmt(ticketMedio),     grad:"linear-gradient(90deg,#00d4ff,#ff2d78)"},
        ].map(k=>(
          <div key={k.label} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:"20px 18px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:k.grad}}/>
            <div style={{fontSize:24,marginBottom:8}}>{k.icon}</div>
            <div style={{fontSize:11,color:"#7a9bb5",letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>{k.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,background:k.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{k.value}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["overview","📊 Visão mensal"],["projects","📋 Projetos"],["cashflow","📈 Fluxo 6 meses"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"7px 16px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,
              fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5,
              borderColor:tab===t?"#00d4ff":"rgba(0,212,255,0.2)",
              background:tab===t?"rgba(0,212,255,0.15)":"transparent",
              color:tab===t?"#00d4ff":"#7a9bb5"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── TAB: Overview mensal ── */}
      {tab==="overview"&&(
        <div>
          {/* Month nav */}
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
            <button onClick={()=>changeMonth(-1)} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:6,padding:"4px 12px",color:"#00d4ff",cursor:"pointer",fontSize:16}}>‹</button>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,letterSpacing:1,color:"#e8f4f8",textTransform:"capitalize",minWidth:180,textAlign:"center"}}>{monthLabel}</span>
            <button onClick={()=>changeMonth(1)} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:6,padding:"4px 12px",color:"#00d4ff",cursor:"pointer",fontSize:16}}>›</button>
            <div style={{marginLeft:"auto",display:"flex",gap:16}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"#7a9bb5"}}>Recebido</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#27AE60"}}>{fmt(monthReceived)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"#7a9bb5"}}>Pendente</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ffb800"}}>{fmt(monthPending)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"#7a9bb5"}}>Total mês</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#00d4ff"}}>{fmt(monthTotal)}</div>
              </div>
            </div>
          </div>

          {/* Month installments */}
          {monthInstallments.length===0 ? (
            <div style={{textAlign:"center",padding:"48px 0",color:"#7a9bb5",fontSize:13,border:"1px dashed rgba(0,212,255,0.15)",borderRadius:12}}>
              Nenhum pagamento neste mês.<br/>
              <span style={{color:"#00d4ff",cursor:"pointer",fontSize:12}} onClick={()=>setModal("add")}>+ Adicionar projeto →</span>
            </div>
          ) : (
            <div style={{display:"grid",gap:8}}>
              {[...monthInstallments].sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).map((i,idx)=>{
                const isOverdue = !i.paid && i.dueDate < today_str;
                return (
                  <div key={idx} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",borderRadius:10,
                    background:i.paid?"rgba(39,174,96,0.06)":"rgba(255,255,255,0.02)",
                    border:`1px solid ${isOverdue?"rgba(255,45,120,0.3)":i.paid?"rgba(39,174,96,0.25)":"rgba(0,212,255,0.1)"}`}}>
                    <button onClick={()=>toggleInstallment(i.project.id,i.num)}
                      style={{width:24,height:24,borderRadius:6,border:`2px solid ${i.paid?"#27AE60":"rgba(0,212,255,0.3)"}`,
                        background:i.paid?"rgba(39,174,96,0.25)":"transparent",cursor:"pointer",
