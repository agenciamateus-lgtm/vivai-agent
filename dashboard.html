                      </div>
                    </div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,
                      color:i.paid?"#27AE60":isOverdue?"#ff2d78":"#ffb800"}}>
                      {fmt(i.value)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── TAB: Projetos ── */}
      {tab==="projects"&&(
        <div style={{display:"grid",gap:10}}>
          {payments.length===0&&(
            <div style={{textAlign:"center",padding:"48px 0",color:"#7a9bb5",fontSize:13,border:"1px dashed rgba(0,212,255,0.15)",borderRadius:12}}>
              Nenhum projeto cadastrado.
            </div>
          )}
          {payments.map(p=>{
            const client = clients.find(c=>c.id===p.clientId);
            const paid = p.installments?.filter(i=>i.paid).reduce((s,i)=>s+i.value,0)||0;
            const pct = Math.round(paid/p.total*100);
            const lastDue = p.installments?.[p.installments.length-1]?.dueDate||"—";
            const hasOverdue = p.installments?.some(i=>!i.paid&&i.dueDate<today_str);
            return (
              <div key={p.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${hasOverdue?"rgba(255,45,120,0.25)":"rgba(0,212,255,0.12)"}`,borderRadius:12,padding:"16px 20px"}}>
                <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:12}}>
                  {client&&<Avatar name={client.name} size={38}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:15,color:"#e8f4f8"}}>{client?.name||"Cliente"}</div>
                    <div style={{fontSize:12,color:"#7a9bb5"}}>{p.desc} · {p.parcelas}x · Até {lastDue}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#ffb800"}}>{fmt(p.total)}</div>
                    <div style={{fontSize:11,color:"#7a9bb5"}}>{fmt(paid)} recebido</div>
                  </div>
                  <button onClick={()=>delPayment(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#7a9bb5",fontSize:16,padding:4}}>✕</button>
                </div>
                {/* Progress bar */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:"#7a9bb5"}}>Progresso</span>
                    <span style={{fontSize:11,color:pct===100?"#27AE60":"#ffb800",fontWeight:600}}>{pct}%</span>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:6,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:pct===100?"#27AE60":"linear-gradient(90deg,#00d4ff,#ffb800)",borderRadius:4}}/>
                  </div>
                </div>
                {/* Installments mini */}
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {p.installments?.map(i=>{
                    const od = !i.paid&&i.dueDate<today_str;
                    return (
                      <button key={i.num} onClick={()=>toggleInstallment(p.id,i.num)}
                        title={`Parcela ${i.num} — ${fmt(i.value)} — ${i.dueDate}`}
                        style={{padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                          background:i.paid?"rgba(39,174,96,0.2)":od?"rgba(255,45,120,0.15)":"rgba(255,184,0,0.1)",
                          color:i.paid?"#27AE60":od?"#ff2d78":"#ffb800"}}>
                        {i.paid?"✓":od?"⚠":`${i.num}ª`} {fmt(i.value)}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TAB: Cashflow ── */}
      {tab==="cashflow"&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:24}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:20,textTransform:"uppercase"}}>
            Fluxo de caixa — últimos 6 meses
          </div>
          {/* Chart */}
          <div style={{display:"flex",gap:12,alignItems:"flex-end",height:180,marginBottom:12}}>
            {monthChart.map((m,i)=>{
              const recH = Math.max((m.received/maxChart)*160,m.received>0?4:0);
              const penH = Math.max((m.pending/maxChart)*160,m.pending>0?4:0);
              const isCur = m.ym===curMonth;
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:10,color:"#7a9bb5",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>
                    {fmt(m.received+m.pending).replace("R$","").trim()}
                  </div>
                  <div style={{width:"100%",display:"flex",gap:3,alignItems:"flex-end",height:160}}>
                    {/* Received bar */}
                    <div style={{flex:1,height:recH,background:"#27AE60",borderRadius:"4px 4px 0 0",opacity:0.85,transition:"height 0.5s ease"}}/>
                    {/* Pending bar */}
                    <div style={{flex:1,height:penH,background:"#ffb800",borderRadius:"4px 4px 0 0",opacity:0.7,transition:"height 0.5s ease"}}/>
                  </div>
                  <div style={{fontSize:11,color:isCur?"#00d4ff":"#7a9bb5",fontWeight:isCur?700:400,
                    fontFamily:"'Barlow Condensed',sans-serif",textTransform:"capitalize"}}>{m.label}</div>
                </div>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:20,justifyContent:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#7a9bb5"}}>
              <div style={{width:12,height:12,borderRadius:3,background:"#27AE60"}}/>Recebido
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#7a9bb5"}}>
              <div style={{width:12,height:12,borderRadius:3,background:"#ffb800"}}/>Pendente
            </div>
          </div>
          {/* Month details */}
          <div style={{marginTop:20,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {monthChart.filter(m=>m.received>0||m.pending>0).map((m,i)=>(
              <div key={i} style={{padding:"10px 12px",borderRadius:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:11,color:"#7a9bb5",textTransform:"capitalize",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>{m.label}</div>
                <div style={{fontSize:12,color:"#27AE60"}}>↓ {fmt(m.received)}</div>
                <div style={{fontSize:12,color:"#ffb800"}}>⏳ {fmt(m.pending)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── MODAL: Novo projeto ── */}
      {modal==="add"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(13,31,45,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#122536",border:"1px solid rgba(0,212,255,0.3)",borderRadius:16,width:"100%",maxWidth:460,padding:"24px 28px",boxShadow:"0 0 60px rgba(0,212,255,0.1)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,letterSpacing:1,color:"#00d4ff"}}>Novo Projeto Financeiro</div>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:"#7a9bb5",cursor:"pointer",fontSize:22}}>×</button>
            </div>
            {/* Client */}
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Cliente</label>
              <select value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} style={inp3}>
                <option value="">Selecione...</option>
                {[...clients].sort((a,b)=>a.name.localeCompare(b.name,"pt-BR")).map(c=>(
                  <option key={c.id} value={c.id}>{c.name}{c.company?` — ${c.company}`:""}</option>
                ))}
              </select>
            </div>
            {/* Desc */}
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Descrição do projeto</label>
              <input value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} placeholder="Ex: Aftermovie evento Growlabs" style={inp3}/>
            </div>
            {/* Total + parcelas */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Valor total (R$)</label>
                <input value={form.total} onChange={e=>setForm(p=>({...p,total:e.target.value}))} placeholder="4.890,00" style={inp3}/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Nº de parcelas</label>
                <select value={form.parcelas} onChange={e=>setForm(p=>({...p,parcelas:Number(e.target.value)}))} style={inp3}>
                  {[1,2,3,4,5,6,12].map(n=><option key={n} value={n}>{n}x</option>)}
                </select>
              </div>
            </div>
            {/* Start date */}
            <div style={{marginBottom:20}}>
              <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Data do primeiro pagamento</label>
              <input type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))} style={inp3}/>
            </div>
            {/* Preview */}
            {form.total&&Number(form.parcelas)>1&&(
              <div style={{padding:"10px 14px",background:"rgba(0,212,255,0.05)",borderRadius:8,marginBottom:16,fontSize:12,color:"#7a9bb5"}}>
                {Number(form.parcelas)}x de {fmt(parseFloat(String(form.total).replace(",","."))/Number(form.parcelas))} · Total {fmt(parseFloat(String(form.total).replace(",",".")))}
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={{padding:"9px 18px",borderRadius:8,border:"1px solid rgba(0,212,255,0.2)",background:"transparent",color:"#7a9bb5",fontSize:14,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>Cancelar</button>
              <button onClick={addPayment} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
                Salvar projeto
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ══ NEGÓCIOS ══════════════════════════════════════════════════════════════════

function Negocios({clients, interactions}) {
  const [deals, setDeals] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("vivai_deals")||"[]"); } catch { return []; }
  });
  const [modal, setModal] = React.useState(null);
  const [form, setForm]   = React.useState({clientId:"",title:"",value:"",stage:"Proposta",desc:"",quoteUrl:"",date:today()});
  const [panel, setPanel] = React.useState(null);
  const [editForm, setEditForm] = React.useState({});

  const save = (d) => { setDeals(d); try { localStorage.setItem("vivai_deals",JSON.stringify(d)); } catch {} };

  const addDeal = () => {
    const d = {...form, id:Date.now(), value:parseFloat(String(form.value).replace(",","."))||0, createdAt:today(), activities:[]};
    save([...deals, d]);
    setModal(null);
    setForm({clientId:"",title:"",value:"",stage:"Proposta",desc:"",quoteUrl:"",date:today()});
  };

  const updateDeal = (id, fields) => save(deals.map(d=>d.id===id?{...d,...fields}:d));
  const delDeal = id => { if(confirm("Remover negócio?")) save(deals.filter(d=>d.id!==id)); };

  const addActivity = (dealId, note) => {
    save(deals.map(d=>d.id===dealId?{...d,activities:[...(d.activities||[]),{id:Date.now(),note,date:today()}]}:d));
  };

  const stageColor = {"Lead":"#7a9bb5","Qualificado":"#00d4ff","Proposta":"#ffb800","Negociação":"#ff6b35","Fechado":"#27AE60","Perdido":"#ff2d78"};
  const dealStages = ["Lead","Qualificado","Proposta","Negociação","Fechado","Perdido"];

  const totalPipeline = deals.filter(d=>d.stage!=="Fechado"&&d.stage!=="Perdido").reduce((s,d)=>s+d.value,0);
  const totalFechado  = deals.filter(d=>d.stage==="Fechado").reduce((s,d)=>s+d.value,0);
  const totalPerdido  = deals.filter(d=>d.stage==="Perdido").reduce((s,d)=>s+d.value,0);

  const inp3 = {background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:13,padding:"8px 10px",outline:"none",fontFamily:"'Barlow',sans-serif",width:"100%",boxSizing:"border-box"};

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2,lineHeight:1}}><GradText>Negócios</GradText></div>
          <div style={{color:"#7a9bb5",fontSize:13,marginTop:4}}>Projetos, propostas e deals</div>
        </div>
        <Btn onClick={()=>setModal("add")}>+ Novo Negócio</Btn>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        {[
          {label:"Pipeline ativo",value:fmt(totalPipeline),color:"#00d4ff",icon:"📊"},
          {label:"Fechados",value:fmt(totalFechado),color:"#27AE60",icon:"🏆"},
          {label:"Perdidos",value:fmt(totalPerdido),color:"#ff2d78",icon:"❌"},
        ].map(k=>(
          <div key={k.label} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:12,padding:"16px 18px"}}>
            <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
            <div style={{fontSize:11,color:"#7a9bb5",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>{k.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:k.color}}>{k.value}</div>
          </div>
        ))}
      </div>

      {/* Deals list */}
      <div style={{display:"grid",gap:10}}>
        {deals.length===0&&(
          <div style={{textAlign:"center",padding:"48px 0",color:"#7a9bb5",border:"1px dashed rgba(0,212,255,0.15)",borderRadius:12}}>
            Nenhum negócio ainda.<br/>
            <span style={{color:"#00d4ff",cursor:"pointer",fontSize:12}} onClick={()=>setModal("add")}>+ Criar primeiro negócio →</span>
          </div>
        )}
        {deals.map(d=>{
          const client = clients.find(c=>c.id===d.clientId);
          const isOpen = panel===d.id;
          return (
            <div key={d.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOpen?"rgba(0,212,255,0.3)":"rgba(0,212,255,0.1)"}`,borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"14px 18px",display:"flex",gap:14,alignItems:"center",cursor:"pointer"}} onClick={()=>setPanel(isOpen?null:d.id)}>
                {client&&<Avatar name={client.name} size={38}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:15,color:"#e8f4f8"}}>{d.title}</div>
                  <div style={{fontSize:12,color:"#7a9bb5"}}>{client?.name||"—"} · {d.date}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:20,background:`${stageColor[d.stage]}22`,color:stageColor[d.stage],border:`1px solid ${stageColor[d.stage]}44`}}>{d.stage}</span>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ffb800"}}>{fmt(d.value)}</span>
                </div>
                <span style={{color:"#7a9bb5",fontSize:12}}>{isOpen?"▲":"▼"}</span>
              </div>
              {isOpen&&(
                <div style={{padding:"0 18px 16px",borderTop:"1px solid rgba(0,212,255,0.08)"}}>
                  {/* Stage selector */}
                  <div style={{display:"flex",gap:8,marginTop:12,marginBottom:12,flexWrap:"wrap"}}>
                    {dealStages.map(s=>(
                      <button key={s} onClick={()=>updateDeal(d.id,{stage:s})}
                        style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                          background:d.stage===s?`${stageColor[s]}33`:"rgba(255,255,255,0.05)",
                          color:d.stage===s?stageColor[s]:"#7a9bb5"}}>
                        {s}
                      </button>
                    ))}
                  </div>
                  {/* Description */}
                  {d.desc&&<div style={{fontSize:13,color:"#b0ccd8",lineHeight:1.6,marginBottom:10,padding:"8px 10px",background:"rgba(255,255,255,0.02)",borderRadius:8}}>{d.desc}</div>}
                  {/* Quote link */}
                  {d.quoteUrl&&<div style={{marginBottom:10}}>
                    <a href={d.quoteUrl} target="_blank" style={{color:"#00d4ff",fontSize:12,textDecoration:"none"}}>📄 Ver orçamento</a>
                  </div>}
                  {/* Gerar orçamento */}
                  {client&&<div style={{marginBottom:12}}>
                    <button onClick={()=>window.open(`/quote?id=${client.id}`,'_blank')}
                      style={{padding:"6px 14px",borderRadius:6,border:"1px solid rgba(255,184,0,0.35)",background:"rgba(255,184,0,0.08)",color:"#ffb800",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
                      💰 Gerar / ver orçamento
                    </button>
                  </div>}
                  {/* Activities */}
                  {(d.activities||[]).length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,color:"#7a9bb5",marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>Atividades</div>
                      {d.activities.map(a=>(
                        <div key={a.id} style={{fontSize:12,color:"#b0ccd8",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{color:"#7a9bb5",marginRight:8}}>{a.date}</span>{a.note}
                        </div>
                      ))}
                    </div>
                  )}
                  {/* Add activity */}
                  <AddActivityInline onAdd={note=>addActivity(d.id,note)}/>
                  {/* Delete */}
                  <button onClick={()=>delDeal(d.id)} style={{marginTop:8,padding:"4px 12px",borderRadius:6,border:"1px solid rgba(255,45,120,0.2)",background:"transparent",color:"#ff2d78",fontSize:11,cursor:"pointer"}}>Excluir negócio</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {modal==="add"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(13,31,45,0.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#122536",border:"1px solid rgba(0,212,255,0.3)",borderRadius:16,width:"100%",maxWidth:480,padding:"24px 28px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,letterSpacing:1,color:"#00d4ff"}}>Novo Negócio</div>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:"#7a9bb5",cursor:"pointer",fontSize:22}}>×</button>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Cliente</label>
              <select value={form.clientId} onChange={e=>{
                if(e.target.value==="__new__"){
                  const name=prompt("Nome do novo cliente:");
                  if(name&&name.trim()){
                    const newClient={id:Date.now(),name:name.trim(),company:"",stage:"Lead",value:0,tags:[],createdAt:today()};
                    setClients(p=>[...p,newClient]);
                    setForm(p=>({...p,clientId:newClient.id}));
                  }
                } else {
                  setForm(p=>({...p,clientId:Number(e.target.value)}));
                }
              }} style={inp3}>
                <option value="">Selecione...</option>
                <option value="__new__" style={{color:"#00d4ff",fontWeight:600}}>+ Novo cliente</option>
                <option disabled style={{color:"rgba(122,155,181,0.4)"}}>──────────────</option>
                {[...clients].sort((a,b)=>a.name.localeCompare(b.name,"pt-BR")).map(c=>(
                  <option key={c.id} value={c.id}>{c.name}{c.company?` — ${c.company}`:""}</option>
                ))}
              </select>
            </div>
            {[["title","Título do negócio","Ex: Aftermovie Evento Corporativo"],["desc","Descrição","Detalhes do projeto..."],["value","Valor (R$)",""],["quoteUrl","Link do orçamento (opcional)",""]].map(([f,l,ph])=>(
              <div key={f} style={{marginBottom:12}}>
                <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>{l}</label>
                {f==="desc"?<textarea value={form[f]} onChange={e=>setForm(p=>({...p,[f]:e.target.value}))} placeholder={ph} rows={2} style={{...inp3,resize:"vertical"}}/>:<input value={form[f]} onChange={e=>setForm(p=>({...p,[f]:e.target.value}))} placeholder={ph} style={inp3}/>}
              </div>
            ))}
            <div style={{marginBottom:16}}>
              <label style={{fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"'Barlow Condensed',sans-serif"}}>Etapa</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {dealStages.map(s=><button key={s} onClick={()=>setForm(p=>({...p,stage:s}))} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:form.stage===s?`${stageColor[s]}33`:"rgba(255,255,255,0.05)",color:form.stage===s?stageColor[s]:"#7a9bb5"}}>{s}</button>)}
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(null)} style={{padding:"9px 18px",borderRadius:8,border:"1px solid rgba(0,212,255,0.2)",background:"transparent",color:"#7a9bb5",fontSize:14,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>Cancelar</button>
              <button onClick={addDeal} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AddActivityInline({onAdd}) {
  const [val, setVal] = React.useState("");
  return (
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <input value={val} onChange={e=>setVal(e.target.value)} placeholder="Registrar atividade..."
        style={{flex:1,background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:8,color:"#e8f4f8",fontSize:12,padding:"6px 10px",outline:"none",fontFamily:"'Barlow',sans-serif"}}
        onKeyDown={e=>{if(e.key==="Enter"&&val.trim()){onAdd(val);setVal("");}}}/>
      <button onClick={()=>{if(val.trim()){onAdd(val);setVal("");}}}
        style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(0,212,255,0.2)",background:"transparent",color:"#00d4ff",fontSize:12,cursor:"pointer"}}>+</button>
    </div>
  );
}

// ══ AGENDA ════════════════════════════════════════════════════════════════════

function Agenda({tasks, interactions, clients}) {
  const [mode, setMode]     = React.useState("month");
  const [current, setCurrent] = React.useState(new Date());

  const yr  = current.getFullYear();
  const mo  = current.getMonth();
  const yrmo = `${yr}-${String(mo+1).padStart(2,"0")}`;

  const navigate = (dir) => {
    const d = new Date(current);
    if(mode==="month") d.setMonth(d.getMonth()+dir);
    else if(mode==="week") d.setDate(d.getDate()+dir*7);
    else d.setDate(d.getDate()+dir);
    setCurrent(d);
  };

  const fmtDate = d => d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
  const modeLabel = mode==="month"
    ? current.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})
    : mode==="week" ? `Semana de ${fmtDate(getWeekStart(current))}`
    : current.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"});

  function getWeekStart(d) {
    const s = new Date(d);
    s.setDate(s.getDate()-s.getDay());
    return s;
  }

  // Build events for a given date string
  const getEvents = (dateStr) => {
    const evts = [];
    tasks.filter(t=>t.dueDate===dateStr).forEach(t=>{
      const c = clients.find(x=>x.id===t.clientId);
      evts.push({type:"task",label:t.title,client:c?.name,color:t.done?"#27AE60":t.dueDate<today()?"#ff2d78":"#ffb800",icon:"✓",done:t.done});
    });
    interactions.filter(i=>i.date===dateStr).forEach(i=>{
      const c = clients.find(x=>x.id===i.clientId);
      evts.push({type:"interaction",label:i.note.slice(0,40),client:c?.name||i.clientName,color:"#00d4ff",icon:"💬"});
    });
    return evts;
  };

  // Month view
  const renderMonth = () => {
    const firstDay = new Date(yr,mo,1).getDay();
    const daysInMonth = new Date(yr,mo+1,0).getDate();
    const cells = [];
    for(let i=0;i<firstDay;i++) cells.push(null);
    for(let d=1;d<=daysInMonth;d++) cells.push(d);
    while(cells.length%7!==0) cells.push(null);
    const weeks = [];
    for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
    const todayStr = today();
    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:11,color:"#7a9bb5",padding:"6px 0",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.5}}>{d}</div>
          ))}
        </div>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
            {week.map((d,di)=>{
              if(!d) return <div key={di} style={{minHeight:80,background:"rgba(255,255,255,0.01)",borderRadius:8}}/>;
              const ds = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const evts = getEvents(ds);
              const isToday = ds===todayStr;
              return (
                <div key={di} style={{minHeight:80,background:isToday?"rgba(0,212,255,0.08)":"rgba(255,255,255,0.02)",borderRadius:8,padding:"6px",border:`1px solid ${isToday?"rgba(0,212,255,0.3)":"rgba(255,255,255,0.05)"}`}}>
                  <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?"#00d4ff":"#7a9bb5",marginBottom:4}}>{d}</div>
                  {evts.slice(0,3).map((e,ei)=>(
                    <div key={ei} title={`${e.client}: ${e.label}`} style={{fontSize:10,color:e.color,background:`${e.color}18`,borderRadius:4,padding:"2px 5px",marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {e.icon} {e.client||""} {e.label}
                    </div>
                  ))}
                  {evts.length>3&&<div style={{fontSize:9,color:"#7a9bb5"}}>+{evts.length-3}</div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    );
  };

  // Week/Day view
  const renderList = (days) => {
    return days.map(d=>{
      const ds = d.toISOString().split("T")[0];
      const evts = getEvents(ds);
      const isToday = ds===today();
      return (
        <div key={ds} style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:isToday?"#00d4ff":"#e8f4f8",marginBottom:6,padding:"6px 10px",background:isToday?"rgba(0,212,255,0.08)":"rgba(255,255,255,0.03)",borderRadius:8,border:`1px solid ${isToday?"rgba(0,212,255,0.2)":"rgba(255,255,255,0.06)"}`}}>
            {d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"})}{isToday&&<span style={{fontSize:10,marginLeft:8,color:"#00d4ff"}}>HOJE</span>}
          </div>
          {evts.length===0&&<div style={{fontSize:12,color:"rgba(122,155,181,0.4)",paddingLeft:10}}>Sem eventos</div>}
          {evts.map((e,ei)=>(
            <div key={ei} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 10px",borderRadius:8,marginBottom:4,background:"rgba(255,255,255,0.02)",border:`1px solid ${e.color}22`}}>
              <span style={{fontSize:14}}>{e.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:e.color,fontWeight:500}}>{e.label}</div>
                {e.client&&<div style={{fontSize:11,color:"#7a9bb5"}}>{e.client}</div>}
              </div>
              <div style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`${e.color}22`,color:e.color}}>{e.type==="task"?"Tarefa":"Interação"}</div>
            </div>
          ))}
        </div>
      );
    });
  };

  const getWeekDays = () => {
    const start = getWeekStart(current);
    return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d; });
  };

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Agenda</GradText></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {["month","week","day"].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5,
              borderColor:mode===m?"#00d4ff":"rgba(0,212,255,0.2)",background:mode===m?"rgba(0,212,255,0.15)":"transparent",color:mode===m?"#00d4ff":"#7a9bb5"}}>
              {m==="month"?"Mês":m==="week"?"Semana":"Dia"}
            </button>
          ))}
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>navigate(-1)} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:6,padding:"5px 12px",color:"#00d4ff",cursor:"pointer",fontSize:16}}>‹</button>
        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,letterSpacing:1,color:"#e8f4f8",textTransform:"capitalize",flex:1,textAlign:"center"}}>{modeLabel}</span>
        <button onClick={()=>navigate(1)} style={{background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:6,padding:"5px 12px",color:"#00d4ff",cursor:"pointer",fontSize:16}}>›</button>
        <button onClick={()=>setCurrent(new Date())} style={{background:"transparent",border:"1px solid rgba(0,212,255,0.2)",borderRadius:6,padding:"5px 12px",color:"#7a9bb5",cursor:"pointer",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>Hoje</button>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:16,marginBottom:16}}>
        {[["#ffb800","✓","Tarefas"],["#00d4ff","💬","Interações"]].map(([c,ic,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#7a9bb5"}}>
            <div style={{background:c,width:8,height:8,borderRadius:2}}/>{ic} {l}
          </div>
        ))}
      </div>

      {mode==="month"&&renderMonth()}
      {mode==="week"&&renderList(getWeekDays())}
      {mode==="day"&&renderList([current])}
    </div>
  );
}


// ══ ROOT APP ══════════════════════════════════════════════════════════

function App() {
  const [view, setView] = useState("dashboard");
  const [clients, setClients] = useState([]);
  const [interactions, setInteractions] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [leadScores, setLeadScores] = useState({}); // {clientId: {temp, score, summary}}
  const [analyzing, setAnalyzing] = useState(false);

  useEffect(()=>{
    fetch("/api/data").then(r=>r.json()).then(d=>{
      if(d.clients) setClients(d.clients);
      if(d.interactions) setInteractions(d.interactions);
      if(d.tasks) setTasks(d.tasks);
      if(d.leadScores) setLeadScores(d.leadScores);
    }).catch(()=>{});
  },[]);

  const analyzeLeads = async () => {
    setAnalyzing(true);
    try {
      const res = await fetch("/api/analyze-leads",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clients,interactions,tasks})});
      const data = await res.json();
      if(data.scores) {
        setLeadScores(data.scores);
        fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({leadScores:data.scores})}).catch(()=>{});
      }
    } catch(e){ console.error(e); }
    setAnalyzing(false);
  };

  const persist = (key, data) => fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({[key]:data})}).catch(()=>{});
  const setC = v => { const d=typeof v==="function"?v(clients):v; setClients(d); persist("clients",d); };
  const setI = v => { const d=typeof v==="function"?v(interactions):v; setInteractions(d); persist("interactions",d); };
  const setT = v => { const d=typeof v==="function"?v(tasks):v; setTasks(d); persist("tasks",d); };

  const NAV = [
    {id:"dashboard",     icon:"◈",  label:"Dashboard"},
    {id:"clients",       icon:"👤", label:"Clientes"},
    {id:"pipeline",      icon:"⟶", label:"Pipeline"},
    {id:"negocios",      icon:"🤝", label:"Negócios"},
    {id:"interactions",  icon:"💬", label:"Interações"},
    {id:"tasks",         icon:"✓",  label:"Tarefas"},
    {id:"finance",       icon:"💵", label:"Financeiro"},
    {id:"agenda",        icon:"📅", label:"Agenda"},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"var(--navy)"}}>
      {/* Sidebar */}
      <aside style={{
        width:240, background:"linear-gradient(180deg,#0d1f2d 0%,#0a1a26 100%)",
        borderRight:"1px solid rgba(0,212,255,0.1)",
        display:"flex", flexDirection:"column",
        position:"fixed", left:0, top:0, height:"100vh", zIndex:100,
      }}>
        {/* Logo */}
        <div style={{padding:"24px 20px 20px",borderBottom:"1px solid rgba(0,212,255,0.08)",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <img src={LOGO} alt="VIVAI Studio" style={{width:110,height:110,objectFit:"contain",borderRadius:12}}/>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:3,color:"#7a9bb5",textTransform:"uppercase"}}>CRM · Audiovisual</div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:"16px 12px"}}>
          {NAV.map(n=>{
            const active = view===n.id;
            return (
              <button key={n.id} onClick={()=>setView(n.id)} style={{
                width:"100%", display:"flex", alignItems:"center", gap:12,
                padding:"11px 14px", borderRadius:8, border:"none", cursor:"pointer",
                background:active?"rgba(0,212,255,0.1)":"transparent",
                color:active?"#00d4ff":"rgba(255,255,255,0.45)",
                fontSize:14, fontWeight:active?600:400, marginBottom:3,
                textAlign:"left", transition:"all 0.2s",
                borderLeft:active?"2px solid #00d4ff":"2px solid transparent",
              }}
              onMouseEnter={e=>{if(!active)e.currentTarget.style.background="rgba(255,255,255,0.04)";}}
              onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
                <span style={{fontSize:15,width:18,textAlign:"center",flexShrink:0}}>{n.icon}</span>
                <span style={{fontFamily:"'Barlow',sans-serif"}}>{n.label}</span>
                {active&&<div style={{marginLeft:"auto",width:5,height:5,borderRadius:"50%",background:"#00d4ff",boxShadow:"0 0 8px #00d4ff"}}/>}
              </button>
            );
          })}
        </nav>

        {/* Quote link */}
        <div style={{padding:"12px"}}>
          <a href="/quote" target="_blank" style={{
            display:"flex",alignItems:"center",gap:10,padding:"11px 14px",
            borderRadius:8,background:"rgba(255,184,0,0.1)",
            border:"1px solid rgba(255,184,0,0.35)",textDecoration:"none",
            color:"#ffb800",fontSize:14,fontWeight:600,fontFamily:"'Barlow',sans-serif"
          }}>
            <span>💰</span> Orçamento
          </a>
        </div>

        {/* Footer */}
        <div style={{padding:"14px 20px",borderTop:"1px solid rgba(0,212,255,0.08)",textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(122,155,181,0.5)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>studiovivai.com</div>
        </div>
      </aside>

      {/* Main */}
      <main style={{marginLeft:240,flex:1,padding:"36px 40px",minHeight:"100vh",background:"radial-gradient(ellipse at 20% 50%, rgba(0,100,255,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,45,120,0.04) 0%, transparent 60%)"}}>
        {view==="dashboard"    && <Dashboard clients={clients} interactions={interactions} tasks={tasks} leadScores={leadScores} analyzing={analyzing} onAnalyze={analyzeLeads}/>}
        {view==="clients"      && <Clients clients={clients} setClients={setC} interactions={interactions} setInteractions={setI} tasks={tasks} setTasks={setT} leadScores={leadScores}/>}
        {view==="pipeline"     && <Pipeline clients={clients} setClients={setC} interactions={interactions} setInteractions={setI} tasks={tasks} setTasks={setT}/>}
        {view==="interactions" && <Interactions interactions={interactions} setInteractions={setI} clients={clients}/>}
        {view==="tasks"        && <Tasks tasks={tasks} setTasks={setT} clients={clients}/>}
        {view==="negocios"     && <Negocios clients={clients} interactions={interactions}/>}
        {view==="agenda"       && <Agenda tasks={tasks} interactions={interactions} clients={clients}/>}
        {view==="finance"      && <Finance clients={clients} setClients={setC}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
