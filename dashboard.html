  <title>VIVAI Studio CRM</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>
    :root {
      --navy: #0d1f2d;
      --navy2: #122536;
      --navy3: #1a3147;
      --cyan: #00d4ff;
      --cyan2: #00b8e0;
      --magenta: #ff2d78;
      --orange: #ff8c00;
      --gold: #ffb800;
      --sunset1: #ff2d78;
      --sunset2: #ff6b35;
      --sunset3: #ffb800;
      --sunset4: #00d4ff;
      --white: #ffffff;
      --text: #e8f4f8;
      --muted: #7a9bb5;
      --card: rgba(255,255,255,0.04);
      --border: rgba(0,212,255,0.15);
      --border2: rgba(0,212,255,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); font-family: 'Barlow', sans-serif; color: var(--text); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; opacity: 0.5; }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes pulse-cyan {
      0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.3); }
      50% { box-shadow: 0 0 20px rgba(0,212,255,0.6); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    input, select, textarea, button {
      font-family: 'Barlow', sans-serif;
    }
  </style>

const STAGES = ["Lead","Qualificado","Proposta","Negociação","Fechado"];
const STAGE_COLORS = {
  Lead: "#00d4ff",
  Qualificado: "#00b8e0",
  Proposta: "#ffb800",
  Negociação: "#ff6b35",
  Fechado: "#ff2d78"
};

const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}).format(v||0);
const today = () => new Date().toISOString().split("T")[0];

// ── Gradient text helper ──
const GradText = ({children, style={}}) => (
  <span style={{
    background: "linear-gradient(90deg, #00d4ff, #ff2d78)",
    WebkitBackgroundClip: "text",
    WebkitTextFillColor: "transparent",
    backgroundClip: "text",
    ...style
  }}>{children}</span>
);

// ── Avatar ──
function Avatar({name, size=36}) {
  const initials = name.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();
  const colors = [
    "linear-gradient(135deg,#00d4ff,#0066ff)",
    "linear-gradient(135deg,#ff2d78,#ff6b35)",
    "linear-gradient(135deg,#ffb800,#ff6b35)",
    "linear-gradient(135deg,#00d4ff,#ff2d78)",
  ];
  const bg = colors[name.charCodeAt(0) % colors.length];
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: bg, display:"flex", alignItems:"center", justifyContent:"center",
      color:"#fff", fontSize: size*0.36, fontWeight:700, flexShrink:0,
      border: "1.5px solid rgba(0,212,255,0.4)"
    }}>{initials}</div>
  );
}

// ── Badge ──
function Badge({label, color="#00d4ff"}) {
  return (
    <span style={{
      background: color+"22", color, border:`1px solid ${color}55`,
      borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:600,
      letterSpacing:0.5, textTransform:"uppercase", fontFamily:"'Barlow Condensed',sans-serif"
    }}>{label}</span>
  );
}

// ── KPI Card ──
function KpiCard({icon, label, value, sub, gradient}) {
  return (
    <div className="fade-in" style={{
      background: "rgba(255,255,255,0.03)",
      border: "1px solid rgba(0,212,255,0.15)",
      borderRadius:12, padding:"20px 22px", position:"relative", overflow:"hidden",
      backdropFilter:"blur(10px)"
    }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:gradient}}/>
      <div style={{fontSize:26,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:11,color:"#7a9bb5",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,fontFamily:"'Barlow Condensed',sans-serif"}}>{label}</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:1,lineHeight:1,
        background:gradient, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text"
      }}>{value}</div>
      {sub && <div style={{fontSize:12,color:"#7a9bb5",marginTop:6}}>{sub}</div>}
    </div>
  );
}

// ── Modal ──
function Modal({title, onClose, children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(13,31,45,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(4px)"}}>
      <div style={{background:"#122536",border:"1px solid rgba(0,212,255,0.3)",borderRadius:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflow:"auto",boxShadow:"0 0 60px rgba(0,212,255,0.15)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px 16px",borderBottom:"1px solid rgba(0,212,255,0.15)"}}>
          <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,letterSpacing:1,color:"#00d4ff"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#7a9bb5",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"20px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

// ── Form helpers ──
const fldStyle = {width:"100%",padding:"9px 12px",background:"rgba(0,212,255,0.05)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"#e8f4f8",fontSize:14,outline:"none",boxSizing:"border-box"};
const lblStyle = {fontSize:11,fontWeight:600,color:"#7a9bb5",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"};

function Field({label, ...props}) {
  return <div style={{marginBottom:14}}><label style={lblStyle}>{label}</label><input {...props} style={fldStyle}/></div>;
}
function SelField({label, options, ...props}) {
  return <div style={{marginBottom:14}}><label style={lblStyle}>{label}</label>
    <select {...props} style={fldStyle}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>
  </div>;
}

function Btn({children, variant="primary", onClick, style={}}) {
  const s = {
    primary: {background:"linear-gradient(90deg,#00d4ff,#0066ff)",color:"#fff",border:"none"},
    secondary: {background:"transparent",color:"#00d4ff",border:"1px solid #00d4ff"},
    danger: {background:"linear-gradient(90deg,#ff2d78,#ff6b35)",color:"#fff",border:"none"},
  };
  return <button onClick={onClick} style={{...s[variant],padding:"9px 20px",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif",letterSpacing:0.3,...style}}>{children}</button>;
}

// ══ VIEWS ══════════════════════════════════════════════════════════════

function Dashboard({clients, interactions, tasks}) {
  const totalPipeline = clients.reduce((s,c)=>s+c.value,0);
  const closed = clients.filter(c=>c.stage==="Fechado");
  const closedValue = closed.reduce((s,c)=>s+c.value,0);
  const pending = tasks.filter(t=>!t.done);
  const overdue = pending.filter(t=>t.dueDate<today());
  const stageData = STAGES.map(s=>({stage:s,count:clients.filter(c=>c.stage===s).length,value:clients.filter(c=>c.stage===s).reduce((a,c)=>a+c.value,0)}));
  const maxVal = Math.max(...stageData.map(d=>d.value),1);
  const recent = [...interactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  return (
    <div className="fade-in">
      <div style={{marginBottom:32}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2,lineHeight:1,marginBottom:6}}>
          <GradText>Visão Geral</GradText>
        </div>
        <div style={{color:"#7a9bb5",fontSize:14}}>Bem-vindo de volta. Aqui está o resumo do pipeline da VIVAI.</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:28}}>
        <KpiCard icon="🎬" label="Pipeline Total" value={fmt(totalPipeline)} sub={`${clients.length} clientes ativos`} gradient="linear-gradient(90deg,#00d4ff,#0066ff)"/>
        <KpiCard icon="🏆" label="Fechados" value={fmt(closedValue)} sub={`${closed.length} contratos`} gradient="linear-gradient(90deg,#ffb800,#ff6b35)"/>
        <KpiCard icon="⚡" label="Tarefas Pendentes" value={pending.length} sub={overdue.length>0?`⚠ ${overdue.length} em atraso`:"Tudo em dia"} gradient={overdue.length>0?"linear-gradient(90deg,#ff2d78,#ff6b35)":"linear-gradient(90deg,#00d4ff,#00b800)"}/>
        <KpiCard icon="💬" label="Interações" value={interactions.length} sub="Total registrado" gradient="linear-gradient(90deg,#ff2d78,#ff6b35)"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:18,textTransform:"uppercase"}}>Pipeline por Etapa</div>
          {stageData.map(d=>(
            <div key={d.stage} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:500,color:"#e8f4f8"}}>{d.stage}</span>
                <span style={{fontSize:12,color:"#7a9bb5"}}>{d.count} · {fmt(d.value)}</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.06)",borderRadius:3,height:6,overflow:"hidden"}}>
                <div style={{width:`${(d.value/maxVal)*100}%`,height:"100%",background:`linear-gradient(90deg,${STAGE_COLORS[d.stage]},${STAGE_COLORS[d.stage]}88)`,borderRadius:3,transition:"width 0.8s ease"}}/>
              </div>
            </div>
          ))}
        </div>

        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:12,padding:22}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:1,color:"#00d4ff",marginBottom:18,textTransform:"uppercase"}}>Últimas Interações</div>
          {recent.map(i=>{
            const client = clients.find(c=>c.id===i.clientId);
            return (
              <div key={i.id} style={{display:"flex",gap:12,marginBottom:14,paddingBottom:14,borderBottom:"1px solid rgba(0,212,255,0.08)"}}>
                {client && <Avatar name={client.name} size={34}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#e8f4f8",marginBottom:2}}>{client?.name}</div>
                  <div style={{fontSize:12,color:"#7a9bb5",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{i.note}</div>
                </div>
                <Badge label={i.type} color={i.type==="WhatsApp"?"#25D366":i.type==="Reunião"?"#ffb800":"#00d4ff"}/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Clients({clients, setClients}) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const filtered = clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.company.toLowerCase().includes(search.toLowerCase()));

  const openNew = () => { setForm({name:"",email:"",phone:"",company:"",stage:"Lead",value:"",tags:""}); setModal("new"); };
  const openEdit = c => { setForm({...c,tags:c.tags?.join(", ")||""}); setModal(c); };
  const save = () => {
    const data = {...form,value:Number(form.value)||0,tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):[]};
    if(modal==="new") setClients(p=>[...p,{...data,id:Date.now(),createdAt:today()}]);
    else setClients(p=>p.map(c=>c.id===modal.id?{...c,...data}:c));
    setModal(null);
  };
  const del = id => { if(confirm("Remover cliente?")) setClients(p=>p.filter(c=>c.id!==id)); };

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Clientes</GradText></div>
        <Btn onClick={openNew}>+ Novo Cliente</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar cliente ou empresa..."
        style={{...fldStyle,width:"100%",marginBottom:16,padding:"11px 16px",fontSize:14,borderRadius:10}}/>
      <div style={{display:"grid",gap:10}}>
        {filtered.map(c=>(
          <div key={c.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(0,212,255,0.12)",borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",gap:14,transition:"border-color 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.35)"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(0,212,255,0.12)"}
          >

function Pipeline({clients, setClients}) {
  const [dragging, setDragging] = useState(null);
  const [over, setOver] = useState(null);
  const drop = stage => { if(dragging) setClients(p=>p.map(c=>c.id===dragging?{...c,stage}:c)); setDragging(null); setOver(null); };

  return (
    <div className="fade-in">
      <div style={{marginBottom:28}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2,marginBottom:6}}><GradText>Pipeline</GradText></div>
        <div style={{color:"#7a9bb5",fontSize:14}}>Arraste os cards entre as etapas.</div>
      </div>
      <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:16}}>
        {STAGES.map(stage=>{
          const cols = clients.filter(c=>c.stage===stage);
          const total = cols.reduce((s,c)=>s+c.value,0);
          const isOver = over===stage;
          return (
            <div key={stage} onDragOver={e=>{e.preventDefault();setOver(stage);}} onDrop={()=>drop(stage)} onDragLeave={()=>setOver(null)}
              style={{minWidth:210,flex:"0 0 210px",background:isOver?"rgba(0,212,255,0.06)":"rgba(255,255,255,0.02)",borderRadius:12,padding:14,border:`1px solid ${isOver?STAGE_COLORS[stage]+"66":"rgba(0,212,255,0.12)"}`,transition:"all 0.2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:STAGE_COLORS[stage],boxShadow:`0 0 8px ${STAGE_COLORS[stage]}`}}/>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,color:STAGE_COLORS[stage],letterSpacing:1,textTransform:"uppercase"}}>{stage}</span>
                <span style={{marginLeft:"auto",fontSize:11,color:"#7a9bb5"}}>{cols.length}</span>
              </div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,color:"#7a9bb5",marginBottom:12}}>{fmt(total)}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {cols.map(c=>(
                  <div key={c.id} draggable onDragStart={()=>setDragging(c.id)} onDragEnd={()=>{setDragging(null);setOver(null);}}
                    style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,212,255,0.15)",borderRadius:10,padding:"12px 14px",cursor:"grab",opacity:dragging===c.id?0.4:1,transition:"opacity 0.2s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <Avatar name={c.name} size={26}/>
                      <span style={{fontWeight:600,fontSize:13,color:"#e8f4f8"}}>{c.name}</span>
                    </div>
                    <div style={{fontSize:11,color:"#7a9bb5",marginBottom:6}}>{c.company}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:"#ffb800"}}>{fmt(c.value)}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Tasks({tasks, setTasks, clients}) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({clientId:"",title:"",dueDate:today(),priority:"Média",assignee:""});
  const [filter, setFilter] = useState("pending");
  const filtered = filter==="pending"?tasks.filter(t=>!t.done):filter==="done"?tasks.filter(t=>t.done):tasks;
  const sorted = [...filtered].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const toggle = id => setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del = id => setTasks(p=>p.filter(t=>t.id!==id));
  const save = () => { setTasks(p=>[...p,{...form,id:Date.now(),clientId:Number(form.clientId),done:false}]); setModal(false); setForm({clientId:"",title:"",dueDate:today(),priority:"Média",assignee:""}); };
  const prioColor = {Alta:"#ff2d78",Média:"#ffb800",Baixa:"#00d4ff"};

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:2}}><GradText>Tarefas</GradText></div>
        <Btn onClick={()=>setModal(true)}>+ Nova Tarefa</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["pending","Pendentes"],["done","Concluídas"],["all","Todas"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 14px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5,
            borderColor:filter===v?"#00d4ff":"rgba(0,212,255,0.2)",
            background:filter===v?"rgba(0,212,255,0.15)":"transparent",
            color:filter===v?"#00d4ff":"#7a9bb5"
          }}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:10}}>
        {sorted.map(t=>{
          const client = clients.find(c=>c.id===t.clientId);
          const isOverdue = !t.done && t.dueDate<today();
          return (
            <div key={t.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOverdue?"rgba(255,45,120,0.3)":"rgba(0,212,255,0.1)"}`,borderRadius:12,padding:"14px 18px",display:"flex",gap:12,alignItems:"center",opacity:t.done?0.5:1}}>
              <button onClick={()=>toggle(t.id)} style={{width:22,height:22,borderRadius:5,border:`2px solid ${t.done?"#00d4ff":"rgba(0,212,255,0.3)"}`,background:t.done?"rgba(0,212,255,0.2)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#00d4ff",flexShrink:0,fontSize:12}}>
                {t.done&&"✓"}
              </button>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14,color:"#e8f4f8",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                <div style={{fontSize:12,color:"#7a9bb5",marginTop:2}}>
                  {client?.name} · {t.assignee} · {isOverdue?<span style={{color:"#ff2d78"}}>⚠ Vencida {t.dueDate}</span>:t.dueDate}
                </div>
              </div>
              <Badge label={t.priority} color={prioColor[t.priority]}/>
              <button onClick={()=>del(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#7a9bb5",fontSize:16}}>✕</button>
            </div>
          );
        })}
        {sorted.length===0&&<div style={{textAlign:"center",padding:48,color:"#7a9bb5"}}>Nenhuma tarefa aqui.</div>}
      </div>
      {modal&&<Modal title="Nova Tarefa" onClose={()=>setModal(false)}>
        <div style={{marginBottom:14}}>
          <label style={lblStyle}>Cliente</label>
          <select value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} style={fldStyle}>
            <option value="">Selecione...</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <Field label="Título da tarefa" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
        <Field label="Data limite" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/>
        <SelField label="Prioridade" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} options={TASK_PRIORITIES}/>
        <Field label="Responsável" value={form.assignee} onChange={e=>setForm(p=>({...p,assignee:e.target.value}))}/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn>
          <Btn onClick={save}>Salvar</Btn>
        </div>
      </Modal>}
    </div>
  );
}

  const [teamPrices, setTeamPrices] = useState({cinegrafista:"1500",assistente:"500",fotografo:"1500",editor_rt:"1500"});
  const [edicoes, setEdicoes] = useState({aftermovie:false,reels:false,highlights:false,motion:false,color_grading:false,rolo_filme:false});
  const [edicaoPrices, setEdicaoPrices] = useState({aftermovie:"800",reels:"400",highlights:"600",motion:"1000",color_grading:"1000",rolo_filme:"1500"});
  const [transport, setTransport] = useState(175);
  const [notes, setNotes]     = useState("");
  const [copied, setCopied]   = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);

  // Serviços livres VIVAI
  const [customItems, setCustomItems] = useState([]);

  // Serviços de terceiros
  const [terceiros, setTerceiros] = useState([]);

  // ── Cálculo ────────────────────────────────────────────────────────────────
  const calc = useCallback(() => {
    const diaria_team  = QQTEAM.reduce((s,t)=>s+(team[t.key]||0)*parseMoney(teamPrices[t.key])*diarias, 0);
    const total_team   = QQTEAM.reduce((s,t)=>s+(team[t.key]||0), 0);
    const transport_total = total_team * transport;
    const edicao_total = QQEDICOES.reduce((s,e)=>s+(edicoes[e.key]?parseMoney(edicaoPrices[e.key]):0), 0);
    const custom_total = customItems.reduce((s,i)=>s+parseMoney(i.unitPrice)*(i.qty||1), 0);
    const terceiros_total = terceiros.reduce((s,i)=>s+parseMoney(i.value), 0);

    const subtotal = diaria_team + transport_total + edicao_total + custom_total + terceiros_total;
    const caixa   = subtotal * QQPRICES.caixa;
    const base_nf = subtotal + caixa;
    const imposto = base_nf * QQPRICES.imposto;
    const total   = base_nf + imposto;

    return { diaria_team, transport_total, edicao_total, custom_total,
             terceiros_total, subtotal, caixa, imposto, total, total_team };
  }, [team, diarias, transport, edicoes, customItems, terceiros]);

  const r = calc();

  const handleTeam = (key, delta) =>
    setTeam(p=>({...p,[key]:Math.max(0,(p[key]||0)+delta)}));

  const addCustom = () =>
    setCustomItems(p=>[...p,{id:Date.now(),label:"",qty:1,unitPrice:""}]);

  const addTerceiro = (preset=null) =>
    setTerceiros(p=>[...p,{
      id: Date.now(),
      icon: preset?.icon || "🔧",
      label: preset?.label || "",
      value: preset ? String(preset.sugestao) : "",
    }]);

  // ── PDF ────────────────────────────────────────────────────────────────────
  const downloadPDF = async () => {
    setPdfLoading(true);
    const team_items = QQTEAM.filter(t=>team[t.key]>0).map(t=>({
      qty:team[t.key], label:t.label,
      price_unit:parseMoney(teamPrices[t.key]),
      price_total:team[t.key]*parseMoney(teamPrices[t.key])*diarias
    }));
    const edicao_items = QQEDICOES.filter(e=>edicoes[e.key]).map(e=>({label:e.label,price:parseMoney(edicaoPrices[e.key])}));
    const custom_vivai = customItems.filter(i=>i.label).map(i=>({
      label:i.label, qty:i.qty,
      price_unit:parseMoney(i.unitPrice),
      price_total:parseMoney(i.unitPrice)*(i.qty||1)
    }));
    const terc_items = terceiros.filter(i=>i.label).map(i=>({
      label:`${i.icon} ${i.label}`, price:parseMoney(i.value)
    }));
    const payload = {
      client, event, date, location, notes, diarias,
      total:r.total, subtotal:r.subtotal, caixa:r.caixa,
      imposto:r.imposto, transport_total:r.transport_total,
      edicao_total:r.edicao_total, diaria_team:r.diaria_team,
      custom_total:r.custom_total, terceiros_total:r.terceiros_total,
      team_items, edicao_items, custom_vivai, terc_items
    };
    try {
      const resp = await fetch("/api/quote/pdf",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      if(!resp.ok) throw new Error("Erro ao gerar PDF");
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href=url; a.download=`Proposta_VIVAI_${(client||"proposta").replace(/[^a-zA-Z0-9]/g,"_")}.pdf`;
      a.click(); URL.revokeObjectURL(url);
    } catch(e) { alert("Erro: "+e.message); }
    finally { setPdfLoading(false); }
  };

  // ── Copiar texto ───────────────────────────────────────────────────────────
  const copyText = () => {
    const lines = [
      "ORÇAMENTO VIVAI STUDIO","━━━━━━━━━━━━━━━━━━━━━",
      client?`Cliente: ${client}`:"", event?`Evento: ${event}`:"",
      date?`Data: ${date}`:"", location?`Local: ${location}`:"",
      "","EQUIPE",
      ...QQTEAM.filter(t=>team[t.key]>0).map(t=>`• ${team[t.key]}x ${t.label}: ${fmt(team[t.key]*parseMoney(teamPrices[t.key])*diarias)}`),
      "","EDIÇÃO",
      ...QQEDICOES.filter(e=>edicoes[e.key]).map(e=>`• ${e.label}: ${fmt(parseMoney(edicaoPrices[e.key]))}`),
      ...(customItems.filter(i=>i.label).length ? ["","SERVIÇOS ADICIONAIS",
        ...customItems.filter(i=>i.label).map(i=>`• ${i.label}: ${fmt(parseMoney(i.unitPrice)*(i.qty||1))}`)] : []),
      ...(terceiros.filter(i=>i.label).length ? ["","SERVIÇOS DE TERCEIROS",
        ...terceiros.filter(i=>i.label).map(i=>`• ${i.icon} ${i.label}: ${fmt(parseMoney(i.value))}`)] : []),
      "",`Transporte + alimentação: ${fmt(r.transport_total)}`,
      `Subtotal VIVAI: ${fmt(r.subtotal)}`,
      `Caixa empresa (10%): ${fmt(r.caixa)}`,
      `NF/Impostos (6%): ${fmt(r.imposto)}`,
      ...(r.terceiros_total>0?[`Serviços de terceiros: ${fmt(r.terceiros_total)}`]:[]),
      "━━━━━━━━━━━━━━━━━━━━━",`TOTAL: ${fmt(r.total)}`,
      notes?`\nObs: ${notes}`:"","\nwww.studiovivai.com",
    ].filter(l=>l!==undefined);
    navigator.clipboard.writeText(lines.join("\n")).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    });
  };

  // ── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={{padding:0}}>

        {/* Header */}
        <div style={{marginBottom:28}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:2,
            background:"linear-gradient(90deg,#00d4ff,#ff2d78)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>
            Gerador de Orçamento
          </div>
          <div style={{color:QC.muted,fontSize:13,marginTop:4}}>VIVAI Studio · Audiovisual</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:20,alignItems:"start"}}>

          {/* ── COLUNA ESQUERDA ─────────────────────────────────────────── */}
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* Dados do cliente */}
            <QCard>
              <QLbl>Dados do cliente</QLbl>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[["Cliente","text",client,setClient,"Nome / empresa"],
                  ["Tipo de evento","text",event,setEvent,"Ex: Evento corporativo"],
                  ["Data","date",date,setDate,null],
                  ["Local","text",location,setLocation,"Cidade / endereço"]
                ].map(([l,t,v,set,ph])=>(
                  <div key={l}>
                    <div style={{fontSize:12,color:QC.muted,marginBottom:4}}>{l}</div>
                    <input type={t} value={v} onChange={e=>set(e.target.value)}
                      placeholder={ph||""} style={{...qInp,width:"100%"}}/>
                  </div>
                ))}
              </div>
            </QCard>

            {/* Diárias */}
            <QCard>
              <QLbl>Número de diárias</QLbl>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <button onClick={()=>setDiarias(Math.max(1,diarias-1))}
                  style={{width:36,height:36,borderRadius:8,background:"rgba(0,212,255,0.1)",
                    border:`1px solid ${QC.border2}`,color:QC.cyan,fontSize:20,cursor:"pointer",lineHeight:1}}>−</button>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,color:QC.cyan,
                  letterSpacing:2,minWidth:40,textAlign:"center"}}>{diarias}</div>
                <button onClick={()=>setDiarias(diarias+1)}
                  style={{width:36,height:36,borderRadius:8,background:"rgba(0,212,255,0.1)",
                    border:`1px solid ${QC.border2}`,color:QC.cyan,fontSize:20,cursor:"pointer",lineHeight:1}}>+</button>
                <div style={{color:QC.muted,fontSize:13}}>diária{diarias>1?"s":""} de gravação</div>
              </div>
            </QCard>

            {/* Equipe */}
            <QCard>
              <QLbl>Equipe de produção</QLbl>
              <div style={{display:"grid",gap:8}}>
                {QQTEAM.map(t=>(
                  <div key={t.key} style={{display:"flex",alignItems:"center",gap:12,
                    padding:"10px 12px",borderRadius:10,
                    background:team[t.key]>0?"rgba(0,212,255,0.06)":"transparent",
                    border:`1px solid ${team[t.key]>0?QC.border2:"transparent"}`,transition:"all 0.2s"}}>
                    <span style={{fontSize:20}}>{t.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:500}}>{t.label}</div>
                      <div style={{fontSize:11,color:QC.muted}}>{fmt(t.price)}/diária</div>
                    </div>
                    <Counter value={team[t.key]||0} onChange={v=>handleTeam(t.key,v-(team[t.key]||0))}/>
                    {team[t.key]>0 && (
                      <div style={{fontSize:13,fontWeight:600,color:QC.gold,minWidth:88,
                        textAlign:"right",fontFamily:"'Barlow Condensed',sans-serif"}}>
                        {fmt(team[t.key]*t.price*diarias)}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </QCard>

            {/* Pós-produção */}
            <QCard>
              <QLbl>Pós-produção / edição</QLbl>
              <div style={{display:"grid",gap:8}}>
                {QQQEDICOES.map(e=>(
                  <div key={e.key}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",
                      borderRadius:10,
                      background:edicoes[e.key]?QC.amber:"rgba(255,255,255,0.03)",
                      border:`1px solid ${edicoes[e.key]?QQC.amberBorder:QC.border}`,transition:"all 0.2s"}}>
                    {/* Toggle */}
                    <div onClick={()=>setEdicoes(p=>({...p,[e.key]:!p[e.key]}))}
                      style={{width:20,height:20,borderRadius:5,cursor:"pointer",flexShrink:0,
                        border:`2px solid ${edicoes[e.key]?QC.gold:"rgba(0,212,255,0.3)"}`,
                        background:edicoes[e.key]?"rgba(255,184,0,0.3)":"transparent",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        color:QC.gold,fontSize:12}}>
                      {edicoes[e.key]&&"✓"}
                    </div>
                    <span style={{fontSize:18,flexShrink:0}}>{e.icon}</span>
                    <div style={{flex:1,cursor:"pointer"}}
                      onClick={()=>setEdicoes(p=>({...p,[e.key]:!p[e.key]}))}>
                      <div style={{fontSize:14,fontWeight:500}}>{e.label}</div>
                    </div>
                    {/* Preço editável */}
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:11,color:QC.muted}}>R$</span>
                      <input
                        value={edicaoPrices[e.key]}
                        onChange={ev=>{
                          const v = ev.target.value;
                          setEdicaoPrices(p=>({...p,[e.key]:v}));
                        }}
                        onClick={ev=>ev.stopPropagation()}
                        style={{...qInp,width:90,textAlign:"right",
                          color:edicoes[e.key]?QC.gold:QC.muted,
                          borderColor:edicoes[e.key]?QQC.amberBorder:QC.border}}
                        placeholder="0"/>
                    </div>
                    {edicoes[e.key] && (
                      <div style={{fontSize:13,fontWeight:600,color:QC.gold,minWidth:88,
                        textAlign:"right",fontFamily:"'Barlow Condensed',sans-serif"}}>
                        {fmt(parseMoney(edicaoPrices[e.key]))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </QCard>

            {/* Transporte */}
            <QCard>
              <QLbl>Transporte + alimentação por pessoa</QLbl>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <input type="range" min={0} max={400} step={25} value={transport}
                  onChange={e=>setTransport(Number(e.target.value))}
                  style={{flex:1,accentColor:QC.cyan}}/>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:QC.cyan,minWidth:88}}>
                  {fmt(transport)}
                </div>
              </div>
              <div style={{fontSize:12,color:QC.muted,marginTop:5}}>
                {r.total_team} pessoa{r.total_team!==1?"s":""} → total {fmt(r.transport_total)}
              </div>
            </QCard>

            {/* ── SERVIÇOS ADICIONAIS VIVAI (livre) ──────────────────────── */}
            <QCard style={{border:`1px solid rgba(0,212,255,0.25)`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <QLbl>Serviços adicionais VIVAI</QLbl>
                <button onClick={addCustom}
                  style={{background:"rgba(0,212,255,0.1)",border:`1px solid ${QC.border2}`,
                    borderRadius:6,padding:"4px 12px",color:QC.cyan,fontSize:12,
                    fontWeight:600,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
                  + Adicionar
                </button>
              </div>
              <div style={{fontSize:12,color:QC.muted,marginBottom:10}}>
                Serviços específicos com descrição e valor livre — drone, live, motion, transmissão, etc.
              </div>

              {customItems.length===0 && (
                <div style={{textAlign:"center",padding:"18px 0",color:QC.muted,fontSize:13,
                  border:`1px dashed rgba(0,212,255,0.15)`,borderRadius:8}}>
                  Nenhum serviço adicional. Clique em "+ Adicionar" para incluir.
                </div>
              )}

              {/* Cabeçalho das colunas */}
              {customItems.length>0 && (
                <div style={{display:"flex",gap:8,marginBottom:6,padding:"0 10px"}}>
                  <div style={{flex:1,fontSize:10,color:QC.muted,textTransform:"uppercase",letterSpacing:0.8}}>Descrição</div>
                  <div style={{width:52,fontSize:10,color:QC.muted,textTransform:"uppercase",letterSpacing:0.8,textAlign:"center"}}>Qtd</div>
                  <div style={{width:8}}/>
                  <div style={{width:110,fontSize:10,color:QC.muted,textTransform:"uppercase",letterSpacing:0.8,textAlign:"right"}}>Valor unit.</div>
                  <div style={{width:90,fontSize:10,color:QC.muted,textTransform:"uppercase",letterSpacing:0.8,textAlign:"right"}}>Total</div>
                  <div style={{width:22}}/>
                </div>
              )}

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {customItems.map(item=>(
                  <CustomRow key={item.id} item={item}
                    onChange={v=>setCustomItems(p=>p.map(i=>i.id===item.id?v:i))}
                    onRemove={()=>setCustomItems(p=>p.filter(i=>i.id!==item.id))}/>
                ))}
              </div>

              {customItems.length>0 && (
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:10,
                  paddingTop:8,borderTop:`1px solid rgba(0,212,255,0.1)`}}>
                  <span style={{fontSize:12,color:QC.muted,marginRight:8}}>Subtotal serviços:</span>
                  <span style={{fontSize:14,fontWeight:600,color:QC.gold,
                    fontFamily:"'Barlow Condensed',sans-serif"}}>{fmt(r.custom_total)}</span>
                </div>
              )}
            </QCard>

            {/* ── SERVIÇOS DE TERCEIROS ───────────────────────────────────── */}
            <QCard style={{border:`1px solid rgba(255,45,120,0.25)`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <QLbl>Serviços de terceiros</QLbl>
              </div>
              <div style={{fontSize:12,color:QC.muted,marginBottom:12}}>
                Custos repassados ao cliente. <span style={{color:"rgba(255,45,120,0.8)"}}>Incluídos no faturamento total com impostos.</span>
              </div>

              {/* Atalhos rápidos */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                {TERCEIROS_PRESET.map(p=>(
                  <button key={p.label} onClick={()=>addTerceiro(p)}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                      borderRadius:8,background:QC.pink,border:`1px solid ${QQC.pinkBorder}`,
                      cursor:"pointer",color:QC.text,fontSize:12,fontWeight:500,
                      fontFamily:"'Barlow',sans-serif",textAlign:"left",transition:"all 0.2s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,45,120,0.15)"}
                    onMouseLeave={e=>e.currentTarget.style.background=QC.pink}>
                    <span style={{fontSize:16}}>{p.icon}</span>
                    <span style={{flex:1,lineHeight:1.3}}>{p.label}</span>
                  </button>
                ))}
              </div>

              {/* Linha manual */}
              <button onClick={()=>addTerceiro()}
                style={{width:"100%",padding:"8px",borderRadius:8,
                  background:"transparent",border:`1px dashed rgba(255,45,120,0.3)`,
                  color:"rgba(255,45,120,0.7)",fontSize:12,cursor:"pointer",
                  fontFamily:"'Barlow',sans-serif",marginBottom:10}}>
                + Outro serviço de terceiro (manual)
              </button>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {terceiros.map(item=>(
                  <TerceiroRow key={item.id} item={item}
                    onChange={v=>setTerceiros(p=>p.map(i=>i.id===item.id?v:i))}
                    onRemove={()=>setTerceiros(p=>p.filter(i=>i.id!==item.id))}/>
                ))}
              </div>

              {terceiros.length>0 && (
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:10,
                  paddingTop:8,borderTop:`1px solid rgba(255,45,120,0.15)`}}>
                  <span style={{fontSize:12,color:QC.muted,marginRight:8}}>Total terceiros:</span>
                  <span style={{fontSize:14,fontWeight:600,color:"#ff2d78",
                    fontFamily:"'Barlow Condensed',sans-serif"}}>{fmt(r.terceiros_total)}</span>
                </div>
              )}
            </QCard>

            {/* Observações */}
            <QCard>
              <QLbl>Observações</QLbl>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3}
                placeholder="Condições especiais, forma de pagamento, validade do orçamento..."
                style={{...qInp,width:"100%",resize:"vertical"}}/>
            </QCard>
          </div>

          {/* ── COLUNA DIREITA — Resumo ─────────────────────────────────── */}
          <div style={{position:"sticky",top:24}}>
            <QCard style={{border:`1px solid ${QC.border2}`}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,
                color:QC.cyan,marginBottom:16}}>
                Resumo do orçamento
              </div>

              {(client||event) && (
                <div style={{marginBottom:14,paddingBottom:14,
                  borderBottom:`1px solid rgba(0,212,255,0.1)`}}>
                  {client && <div style={{fontSize:14,fontWeight:600}}>{client}</div>}
                  {event  && <div style={{fontSize:12,color:QC.muted}}>{event}{date?` · ${date}`:""}</div>}
                </div>
              )}

              {/* Breakdown VIVAI */}
              <div style={{marginBottom:6}}>
                <div style={{fontSize:10,color:QC.cyan,letterSpacing:1,textTransform:"uppercase",
                  fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>VIVAI Studio</div>
                <QRow label={`Equipe (${diarias} dia${diarias>1?"s":""})`} value={fmt(r.diaria_team)}/>
                {r.transport_total>0 && <QRow label="Transporte + alimentação" value={fmt(r.transport_total)}/>}
                {r.edicao_total>0 && <QRow label="Pós-produção" value={fmt(r.edicao_total)}/>}
                {r.custom_total>0 && <QRow label="Serviços adicionais" value={fmt(r.custom_total)}/>}
                <QRow label="Subtotal" value={fmt(r.subtotal)} bold/>
                <QRow label="Caixa empresa (10%)" value={fmt(r.caixa)} muted/>
                <QRow label="NF / impostos (6%)" value={fmt(r.imposto)} muted/>
              </div>

              {/* Terceiros */}
              {r.terceiros_total>0 && (
                <div style={{marginTop:10,paddingTop:10,
                  borderTop:`1px solid rgba(255,45,120,0.2)`,marginBottom:6}}>
                  <div style={{fontSize:10,color:"#ff2d78",letterSpacing:1,
                    textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>
                    Terceiros (repasse)
                  </div>
                  {terceiros.filter(i=>i.label).map(i=>(
                    <QRow key={i.id} label={`${i.icon} ${i.label}`}
                      value={fmt(parseMoney(i.value))} color="#ff6b8a"/>
                  ))}
                  <QRow label="Subtotal terceiros" value={fmt(r.terceiros_total)}
                    bold color="#ff2d78"/>
                </div>
              )}

              {/* Total */}
              <div style={{background:"rgba(0,212,255,0.08)",borderRadius:10,
                padding:"14px 16px",border:`1px solid ${QC.border2}`,
                margin:"12px 0 16px"}}>
                <div style={{fontSize:10,color:QC.muted,letterSpacing:1,
                  textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>
                  Total geral
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:1,
                  background:"linear-gradient(90deg,#00d4ff,#ffb800)",
                  WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                  {fmt(r.total)}
                </div>
                {r.terceiros_total>0 && (
                  <div style={{fontSize:11,color:QC.muted,marginTop:4}}>
                    VIVAI {fmt(r.total)} + Terceiros {fmt(r.terceiros_total)}
                  </div>
                )}
              </div>

              {/* Itens resumo */}
              <div style={{marginBottom:16,fontSize:12,color:QC.muted}}>
                {QQTEAM.filter(t=>team[t.key]>0).map(t=>(
                  <div key={t.key} style={{marginBottom:2}}>
                    {t.icon} {team[t.key]}x {t.label} × {diarias} dia{diarias>1?"s":""} — {fmt(team[t.key]*parseMoney(teamPrices[t.key])*diarias)}
                  </div>
                ))}
                {QQEDICOES.filter(e=>edicoes[e.key]).map(e=>(
                  <div key={e.key} style={{marginBottom:2}}>{e.icon} {e.label}</div>
                ))}
                {customItems.filter(i=>i.label).map(i=>(
                  <div key={i.id} style={{marginBottom:2}}>⚙️ {i.label}</div>
                ))}
                {terceiros.filter(i=>i.label).map(i=>(
                  <div key={i.id} style={{marginBottom:2,color:"rgba(255,107,138,0.8)"}}>
                    {i.icon} {i.label}
                  </div>
                ))}
              </div>

              {/* Ações */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <button onClick={copyText}
                  style={{padding:"11px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    background:copied?"rgba(0,200,100,0.2)":"linear-gradient(90deg,#00d4ff,#0066ff)",
                    color:copied?"#00c864":"#fff",fontSize:14,fontWeight:600,
                    fontFamily:"'Barlow',sans-serif",transition:"all 0.3s"}}>
                  {copied ? "✓ Copiado!" : "📋 Copiar orçamento"}
                </button>
                <button onClick={downloadPDF} disabled={pdfLoading}
                  style={{padding:"11px 16px",borderRadius:8,
                    border:`1px solid ${QC.border2}`,cursor:pdfLoading?"wait":"pointer",
                    background:"transparent",color:QC.cyan,fontSize:14,fontWeight:600,
                    fontFamily:"'Barlow',sans-serif",opacity:pdfLoading?0.6:1}}>
                  {pdfLoading ? "⏳ Gerando..." : "📄 Gerar Proposta PDF"}
                </button>
              </div>
            </QCard>
          </div>
        </div>
      </div>
    </>
  );
}


// ══ ROOT APP ══════════════════════════════════════════════════════════

function App() {
  const [view, setView] = useState("dashboard");
  const [clients, setClients] = useState([]);
  const [interactions, setInteractions] = useState([]);
  const [tasks, setTasks] = useState([]);

  useEffect(()=>{
    fetch("/api/data").then(r=>r.json()).then(d=>{
      if(d.clients) setClients(d.clients);
      if(d.interactions) setInteractions(d.interactions);
      if(d.tasks) setTasks(d.tasks);
    }).catch(()=>{});
  },[]);

  const persist = (key, data) => fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({[key]:data})}).catch(()=>{});
  const setC = v => { const d=typeof v==="function"?v(clients):v; setClients(d); persist("clients",d); };
  const setI = v => { const d=typeof v==="function"?v(interactions):v; setInteractions(d); persist("interactions",d); };
  const setT = v => { const d=typeof v==="function"?v(tasks):v; setTasks(d); persist("tasks",d); };

  const NAV = [
    {id:"dashboard", icon:"◈", label:"Dashboard"},
    {id:"clients",   icon:"👤", label:"Clientes"},
    {id:"pipeline",  icon:"⟶", label:"Pipeline"},
    {id:"interactions", icon:"💬", label:"Interações"},
    {id:"tasks",     icon:"✓",  label:"Tarefas"},
    {id:"quote",     icon:"💰", label:"Orçamento"},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"var(--navy)"}}>
      {/* Sidebar */}
      <aside style={{
        width:240, background:"linear-gradient(180deg,#0d1f2d 0%,#0a1a26 100%)",
        borderRight:"1px solid rgba(0,212,255,0.1)",
        display:"flex", flexDirection:"column",
        position:"fixed", left:0, top:0, height:"100vh", zIndex:100,
      }}>
        {/* Logo */}
        <div style={{padding:"24px 20px 20px",borderBottom:"1px solid rgba(0,212,255,0.08)",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <img src={LOGO} alt="VIVAI Studio" style={{width:110,height:110,objectFit:"contain",borderRadius:12}}/>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,letterSpacing:3,color:"#7a9bb5",textTransform:"uppercase"}}>CRM · Audiovisual</div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:"16px 12px"}}>
          {NAV.map(n=>{
            const active = view===n.id;
            return (
              <button key={n.id} onClick={()=>setView(n.id)} style={{
                width:"100%", display:"flex", alignItems:"center", gap:12,
                padding:"11px 14px", borderRadius:8, border:"none", cursor:"pointer",
                background:active?"rgba(0,212,255,0.1)":"transparent",
                color:active?"#00d4ff":"rgba(255,255,255,0.45)",
                fontSize:14, fontWeight:active?600:400, marginBottom:3,
                textAlign:"left", transition:"all 0.2s",
                borderLeft:active?"2px solid #00d4ff":"2px solid transparent",
              }}
              onMouseEnter={e=>{if(!active)e.currentTarget.style.background="rgba(255,255,255,0.04)";}}
              onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
                <span style={{fontSize:15,width:18,textAlign:"center",flexShrink:0}}>{n.icon}</span>
                <span style={{fontFamily:"'Barlow',sans-serif"}}>{n.label}</span>
                {active&&<div style={{marginLeft:"auto",width:5,height:5,borderRadius:"50%",background:"#00d4ff",boxShadow:"0 0 8px #00d4ff"}}/>}
              </button>
            );
          })}
        </nav>

        {/* Footer */}
        <div style={{padding:"14px 20px",borderTop:"1px solid rgba(0,212,255,0.08)",textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(122,155,181,0.5)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>studiovivai.com</div>
        </div>
      </aside>

      {/* Main */}
      <main style={{marginLeft:240,flex:1,padding:"36px 40px",minHeight:"100vh",background:"radial-gradient(ellipse at 20% 50%, rgba(0,100,255,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,45,120,0.04) 0%, transparent 60%)"}}>
        {view==="dashboard"    && <Dashboard clients={clients} interactions={interactions} tasks={tasks}/>}
        {view==="clients"      && <Clients clients={clients} setClients={setC}/>}
        {view==="pipeline"     && <Pipeline clients={clients} setClients={setC}/>}
        {view==="interactions" && <Interactions interactions={interactions} setInteractions={setI} clients={clients}/>}
        {view==="tasks"        && <Tasks tasks={tasks} setTasks={setT} clients={clients}/>}
        {view==="quote"        && <QuoteView/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
